* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

/* ── Loading Screen ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #090a0e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; font-family: 'Georgia', 'Times New Roman', serif;
  transition: opacity 0.5s ease;
}
/* Spinner centered absolutely so it doesn't shift when other elements appear */
#loading-spinner {
  position: absolute;
  top: 50%; left: 50%;
  margin-top: -40px; margin-left: -40px; /* half of max size (80px) */
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }
#loading-logo {
  width: clamp(180px, 50vw, 350px);
  margin-bottom: 10px;
  opacity: 0;
  transform: translateX(-100px);
  transition: none;
}
#loading-logo.slide-in {
  opacity: 1;
  transform: translateX(0);
  transition: opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
}
#loading-title {
  font-size: clamp(32px, 7vw, 64px); font-weight: 900;
  letter-spacing: 0.2em; text-transform: uppercase;
  background: linear-gradient(90deg, #ffd700, #ffcc00, #fff8dc, #ffcc00, #ffd700);
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-top: 0;
  margin-bottom: 50px;
  opacity: 0;
  transform: scale(3);
  transition: none;
}
#loading-title.slam-in {
  opacity: 1;
  transform: scale(1);
  transition: opacity 0.15s ease-out, transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
  animation: titleShimmer 3s ease-in-out infinite alternate;
}
@keyframes slamShake {
  0% { transform: scale(1); }
  15% { transform: scale(1.05) rotate(-1deg); }
  30% { transform: scale(0.97) rotate(0.5deg); }
  45% { transform: scale(1.02) rotate(-0.3deg); }
  60% { transform: scale(0.99); }
  100% { transform: scale(1); }
}
#loading-spinner {
  width: clamp(50px, 10vw, 80px); height: clamp(50px, 10vw, 80px);
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid #ffffff;
  border-right: 3px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 24px;
}
#loading-spinner::before {
  content: '';
  position: absolute; inset: 4px;
  border: 2px solid transparent;
  border-bottom: 2px solid #ffffff;
  border-left: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: spin 1.1s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-enter-btn {
  visibility: hidden; /* takes up space but invisible until pop-in */
  opacity: 0;
  transform: scale(0);
  position: relative; overflow: hidden;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: clamp(14px, 3vw, 21px); font-weight: 900;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: #3a2800;
  text-shadow: 0 1px 0 rgba(255,235,150,0.6);
  background: linear-gradient(
    180deg,
    #fff6a0 0%,
    #ffd700 15%,
    #e6ac00 30%,
    #ffd700 45%,
    #ffec80 50%,
    #ffd700 55%,
    #cc8800 70%,
    #b37700 85%,
    #e6ac00 100%
  );
  border: none; border-radius: 6px;
  padding: 12px 38px;
  cursor: pointer;
  box-shadow:
    0 2px 0 #8a5e00,
    0 4px 8px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.4),
    inset 0 -1px 0 rgba(0,0,0,0.15);
  transition: transform 0.1s, box-shadow 0.1s;
}
#loading-enter-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(
    105deg,
    transparent 30%,
    rgba(255,255,255,0.0) 40%,
    rgba(255,255,255,0.35) 50%,
    rgba(255,255,255,0.0) 60%,
    transparent 70%
  );
  animation: goldShine 3s ease-in-out infinite;
}
#loading-enter-btn:hover {
  transform: scale(1.04);
  box-shadow:
    0 2px 0 #8a5e00,
    0 6px 16px rgba(255,215,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.5),
    inset 0 -1px 0 rgba(0,0,0,0.15);
}
#loading-enter-btn:active {
  transform: scale(0.98) translateY(2px);
  box-shadow:
    0 0 0 #8a5e00,
    0 2px 4px rgba(0,0,0,0.4),
    inset 0 2px 3px rgba(0,0,0,0.2);
}
@keyframes goldShine {
  0% { left: -100%; }
  60% { left: 150%; }
  100% { left: 150%; }
}
@keyframes popJiggle {
  0% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1.15); }
  65% { transform: scale(0.92); }
  78% { transform: scale(1.06); }
  88% { transform: scale(0.97); }
  100% { opacity: 1; transform: scale(1); }
}
#loading-enter-btn.pop-in {
  visibility: visible;
  animation: popJiggle 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}
.share-btn {
  position: relative; overflow: hidden;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: clamp(12px, 2.5vw, 18px); font-weight: 900;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: #3a2800;
  text-shadow: 0 1px 0 rgba(255,235,150,0.6);
  background: linear-gradient(180deg, #fff6a0 0%, #ffd700 15%, #e6ac00 30%, #ffd700 45%, #ffec80 50%, #ffd700 55%, #cc8800 70%, #b37700 85%, #e6ac00 100%);
  border: none; border-radius: 6px;
  padding: 10px 24px;
  cursor: pointer;
  box-shadow: 0 2px 0 #8a5e00, 0 4px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -1px 0 rgba(0,0,0,0.15);
  transition: transform 0.1s, box-shadow 0.1s;
  text-decoration: none;
  z-index: 20;
  margin-top: 8px;
}
.share-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.0) 40%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.0) 60%, transparent 70%);
  animation: goldShine 3s ease-in-out infinite;
}
.share-btn:hover {
  transform: scale(1.04);
  box-shadow: 0 2px 0 #8a5e00, 0 6px 16px rgba(255,215,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -1px 0 rgba(0,0,0,0.15);
}
.share-btn:active {
  transform: scale(0.98) translateY(2px);
}
body { background: #090a0e; font-family: 'Segoe UI', Arial, sans-serif;
  -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;

#score-display {

#start-screen, #game-over-screen {

#startscreen-img {

  object-fit: contain;
  pointer-events: none;
  z-index: 1;
}
/* Start screen overlay — tracks the image bounds */
#startscreen-overlay {
  position: absolute;
  pointer-events: none;

}
/* Epstein Dash title — animated glow, positioned relative to image */
#epstein-dash-title {
  position: absolute;
  top: 33%;
  left: 5%; right: 5%;
  z-index: 3;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 48px; /* overridden by JS fitOverlay */
  font-weight: 900;
  letter-spacing: 0.3em;
  text-indent: 0.3em; /* compensate for trailing letter-spacing */
  text-transform: uppercase;
  white-space: nowrap;
  text-align: center;

  text-shadow: none;

}
@keyframes titleShimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
/* START button — positioned inside the ornate frame button area */
#start-btn {
  position: absolute !important;
  bottom: calc(12% - 20px);
  left: 50%;
  transform: translateX(-50%) scale(1);
  z-index: 5;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 32px; /* overridden by JS fitOverlay */
  font-weight: 900;
  letter-spacing: 0.4em;
  text-indent: 0.4em; /* compensate for trailing letter-spacing to center visually */
  color: #ffd700 !important;
  background: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  padding: 0 !important;
  line-height: 1;
  cursor: pointer;
  pointer-events: auto;
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 25px rgba(255,165,0,0.3);
  -webkit-text-fill-color: #ffd700;
  animation: startPulse 2s ease-in-out infinite;
  transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), text-shadow 0.35s ease-in-out, filter 0.35s ease-in-out;
}
#start-btn:hover {
  transform: translateX(-50%) scale(1.08);
  text-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 40px rgba(255,165,0,0.5);
  filter: brightness(1.15);
}
#start-btn.btn-pressed {
  transform: translateX(-50%) scale(0.88) !important;
  filter: brightness(0.85);
  transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), filter 0.1s ease-in-out;
}
#start-btn.btn-release {
  transform: translateX(-50%) scale(1.05) !important;
  filter: brightness(1.1);
  transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.25s ease-in-out;
}
@keyframes startPulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; text-shadow: 0 0 15px rgba(255,215,0,0.8), 0 0 30px rgba(255,165,0,0.4); }
}
/* Chase canvas for start screen — positioned inside overlay */
#start-chase-canvas {
  position: absolute;
  z-index: 1;

}
/* Controls hint on start screen */

  position: absolute;

}
#game-over-screen {
  background: #090a0e;
}
/* ─── Layered endscreen: all layers are 5504x3072, stacked with object-fit:contain ─── */
.endscreen-layer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
}
/* Layer 5: static background */
#endlayer-5 { z-index: 1; }
/* Layer 5.5: illustration panel — static */
#endlayer-5-5 { z-index: 1; }
/* Layer 4: website URL — shake notification then pause */
#endlayer-4 {
  z-index: 2;
  animation: urlShakeNotify 4s ease-in-out infinite;
  transition: filter 0.3s ease;
}
@keyframes urlShakeNotify {
  0%, 20%, 100% { transform: translateX(0); filter: brightness(1) drop-shadow(0 0 0px transparent); }
  2% { transform: translateX(-4px) rotate(-1deg); filter: brightness(1.3) drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
  4% { transform: translateX(4px) rotate(1deg); filter: brightness(1.3) drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
  6% { transform: translateX(-3px) rotate(-0.5deg); filter: brightness(1.2) drop-shadow(0 0 8px rgba(255,215,0,0.4)); }
  8% { transform: translateX(3px) rotate(0.5deg); filter: brightness(1.2) drop-shadow(0 0 8px rgba(255,215,0,0.4)); }
  10% { transform: translateX(-2px); filter: brightness(1.1) drop-shadow(0 0 6px rgba(255,215,0,0.3)); }
  12% { transform: translateX(0); filter: brightness(1) drop-shadow(0 0 0px transparent); }
}
#endlayer-4.hovered {
  animation: none;
  transform: scale(1.05);
  filter: brightness(1.3) drop-shadow(0 0 18px rgba(255,215,0,0.6));
  cursor: pointer;
}
/* Layer 3: static frame */
#endlayer-3 { z-index: 4; }
/* Layer 2: Run Again button */
#endlayer-2 {
  z-index: 5;
  transform-origin: 50% 90%;
  transition: transform 0.3s ease, filter 0.3s ease;
}
#endlayer-2.hovered {
  transform: scale(1.03);
  filter: brightness(1.3) drop-shadow(0 0 14px rgba(255,215,0,0.5));
}
/* Hitbox over Run Again area — also carries the gold streak */
#endlayer-2-hitbox {
  position: absolute;
  cursor: pointer;
  pointer-events: auto;
  background: transparent;
  border: none; outline: none;
  z-index: 6;
  font-size: 1px;

}
#endlayer-2-hitbox::before {
  content: '';

  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.0) 40%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.0) 60%, transparent 70%);
  animation: goldShine 3s ease-in-out 1.5s infinite;

}
/* Layer 1: BUSTED! text — pulse with red glow */
#endlayer-1 {
  z-index: 7;
  animation: bustedPulse 2.5s ease-in-out infinite;
}
@keyframes bustedPulse {
  0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0px transparent); }
  50% { transform: scale(1.03); filter: brightness(1.2) drop-shadow(0 0 12px rgba(255,0,0,0.5)); }
}
/* Layer 0: red lights — subtle slow pulse */
#endlayer-0 {
  z-index: 8;
  animation: lightsPulse 3.5s ease-in-out infinite;
}
@keyframes lightsPulse {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.015); opacity: 1; }
}
/* Overlay — tracks rendered image bounds for positioning interactive elements */
#endscreen-overlay {

<script type="module">
import * as THREE from 'three';

// ─────────────────────────────────────────────
// ASSET PRELOADER
// ─────────────────────────────────────────────
const assetPreloader = (() => {
  const imageUrls = [
    'assets/images/dor_bros_logo.png',
    'assets/images/start_screen.png',
    'assets/images/x-share.png',
    'assets/images/busted_screens/0.png',
    'assets/images/busted_screens/1.png',
    'assets/images/busted_screens/2.png',
    'assets/images/busted_screens/3.png',
    'assets/images/busted_screens/4.png',
    'assets/images/busted_screens/5.png',
    'assets/images/busted_screens/5.5.png',
  ];
  const audioUrls = [
    'assets/audio/music.mp3',
    'assets/audio/intro.mp3',
    'assets/audio/gameover.mp3',
    'assets/audio/gameover2.mp3',
    'assets/audio/combo.mp3',
    'assets/audio/combo40.mp3',
    'assets/audio/swoosh.mp3',
    'assets/audio/piano.mp3',
  ];

  const videoUrls = ['assets/video/wow2.mp4'];
  const totalAssets = imageUrls.length + audioUrls.length + videoUrls.length + 1; // +1 for Three.js scene init
  let loadedCount = 0;

  const spinnerEl = document.getElementById('loading-spinner');
  const logoEl = document.getElementById('loading-logo');
  const titleEl = document.getElementById('loading-title');
  const enterBtn = document.getElementById('loading-enter-btn');
  const loadingScreen = document.getElementById('loading-screen');

  let introPlayed = false;

  function updateProgress(label) {
    loadedCount++;
    if (loadedCount >= totalAssets && !introPlayed) {
      introPlayed = true;
      onAllLoaded();
    }
  }

  function onAllLoaded() {
    // Fade out spinner, then switch layout for intro sequence
    spinnerEl.style.transition = 'opacity 0.3s ease';
    spinnerEl.style.opacity = '0';
    setTimeout(() => { loadingScreen.classList.add('intro-ready'); }, 300);
    setTimeout(() => { spinnerEl.style.display = 'none'; }, 300);

    // Step 1: Logo slides in with swoosh (after spinner fades)
    setTimeout(() => {
      logoEl.classList.add('slide-in');
      const swoosh = new Audio('assets/audio/swoosh.mp3');
      swoosh.volume = 0.6;
      swoosh.play().catch(() => {});
    }, 400);

    // Step 2: "EPSTEIN DASH" slams in with piano hit (1s after logo)
    setTimeout(() => {
      titleEl.classList.add('slam-in');
      const piano = new Audio('assets/audio/piano.mp3');
      piano.volume = 0.25;
      piano.play().catch(() => {});
      // Add shake effect after the slam lands
      setTimeout(() => {
        titleEl.style.animation = 'slamShake 0.4s ease-out, titleShimmer 3s ease-in-out infinite alternate';
      }, 300);
    }, 1500);

    // Step 3: "Click To Play" pops in with jiggle (0.8s after title)
    setTimeout(() => {
      enterBtn.classList.add('pop-in');
    }, 2500);
  }

  function loadImage(url) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = img.onerror = () => { updateProgress(); resolve(); };
      img.src = url;
    });
  }

  function loadAudio(url) {
    return new Promise(resolve => {
      const audio = new Audio();
      audio.preload = 'auto';
      const done = () => { updateProgress(); resolve(); };
      audio.addEventListener('canplaythrough', done, { once: true });
      audio.addEventListener('error', done, { once: true });
      // Fallback timeout in case events don't fire (some mobile browsers)
      setTimeout(done, 8000);
      audio.src = url;
      audio.load();
    });
  }

  function loadVideo(url) {
    return new Promise(resolve => {
      const vid = document.createElement('video');
      vid.preload = 'auto';
      const done = () => { updateProgress(); resolve(); };
      vid.addEventListener('canplaythrough', done, { once: true });
      vid.addEventListener('error', done, { once: true });
      setTimeout(done, 15000); // longer timeout for video
      vid.src = url;
      vid.load();
    });
  }

  // Play coming.mp3 immediately on site load
  const comingAudio = new Audio('assets/audio/coming.mp3');
  comingAudio.volume = 0.5;
  comingAudio.play().catch(() => {});

  // Start loading everything
  const allPromises = [
    ...imageUrls.map(u => loadImage(u)),
    ...audioUrls.map(u => loadAudio(u)),
    ...videoUrls.map(u => loadVideo(u)),
  ];

  // Mark Three.js scene as loaded once the game calls it
  function markSceneReady() { updateProgress('Initializing scene...'); }

  // Returns a promise that resolves when user clicks "TAP TO ENTER"
  function waitForUserEntry() {
    return new Promise(resolve => {
      enterBtn.addEventListener('click', () => {
        // This click is the user gesture that unlocks audio on mobile
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        actx.resume().then(() => actx.close()).catch(() => {});

        // Fade out coming.mp3 smoothly over 500ms
        const fadeStep = 0.05;
        const fadeInterval = setInterval(() => {
          if (comingAudio.volume > fadeStep) {
            comingAudio.volume -= fadeStep;
          } else {
            comingAudio.volume = 0;
            comingAudio.pause();
            clearInterval(fadeInterval);
          }
        }, 25);

        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
          loadingScreen.style.display = 'none';
          resolve();
        }, 500);
      }, { once: true });
    });
  }

  return { allPromises, markSceneReady, waitForUserEntry };
})();

// ─────────────────────────────────────────────
// AUDIO SYSTEM
// ─────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let musicEnabled = true;
const bgMusic = new Audio('assets/audio/music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;
const gameOverClips = [new Audio('assets/audio/gameover.mp3'), new Audio('assets/audio/gameover2.mp3')];
gameOverClips.forEach(c => c.volume = 0.7);
const comboClip = new Audio('assets/audio/combo.mp3');
comboClip.volume = 0.8;
const combo40Clip = new Audio('assets/audio/combo40.mp3');
combo40Clip.volume = 0.8;
let combo = 0;
let comboTimer = 0;
const COMBO_TIMEOUT = 2.5; // seconds before combo resets
let combo20Played = false;
let combo40Played = false;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playBgMusic() {
  if (musicEnabled) {
    bgMusic.currentTime = 0;
    bgMusic.play().catch(() => {}); // ignore autoplay block
  }
}

function stopBgMusic() {
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

// High-quality synthesized sound effects using Web Audio API
function playSfx(type) {
  if (!audioCtx || !musicEnabled) return;
  const now = audioCtx.currentTime;

  if (type === 'collect') {
    // Rich document pickup - layered chime with harmonics
    const notes = [1047, 1319, 1568]; // C6, E6, G6 chord arpeggio
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      filter.type = 'highpass';
      filter.frequency.value = 800;
      const t = now + i * 0.04;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.06, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(now);
      osc.stop(t + 0.3);
    });
    // Sparkle noise layer
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    const noise = audioCtx.createBufferSource();
    const nGain = audioCtx.createGain();
    const nFilter = audioCtx.createBiquadFilter();
    noise.buffer = buf;
    noise.connect(nFilter);
    nFilter.connect(nGain);
    nGain.connect(audioCtx.destination);
    nFilter.type = 'bandpass';
    nFilter.frequency.value = 6000;
    nFilter.Q.value = 2;
    nGain.gain.setValueAtTime(0.02, now);
    noise.start(now);

  } else if (type === 'jump') {
    // Punchy spring jump - rising tone with body
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const gain2 = audioCtx.createGain();
    osc.connect(gain);
    osc2.connect(gain2);
    gain.connect(audioCtx.destination);
    gain2.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(550, now + 0.12);
    osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(360, now);
    osc2.frequency.exponentialRampToValueAtTime(1100, now + 0.12);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.start(now);
    osc2.start(now);
    osc.stop(now + 0.25);
    osc2.stop(now + 0.2);

  } else if (type === 'boost') {
    // Power-up surge with rising shimmer
    for (let i = 0; i < 4; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = i % 2 === 0 ? 'sawtooth' : 'sine';
      const baseFreq = 300 + i * 200;
      osc.frequency.setValueAtTime(baseFreq, now);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 3, now + 0.35);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now + i * 0.03);
      osc.stop(now + 0.45);
    }

  } else if (type === 'gameover') {
    // Deep descending doom with rumble
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const gain2 = audioCtx.createGain();
    const dist = audioCtx.createWaveShaperFunction ? null : null;
    osc.connect(gain);
    osc2.connect(gain2);
    gain.connect(audioCtx.destination);
    gain2.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(350, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(120, now);
    osc2.frequency.exponentialRampToValueAtTime(30, now + 1.0);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
    osc.start(now);
    osc2.start(now + 0.1);
    osc.stop(now + 1.0);
    osc2.stop(now + 1.2);

  } else if (type === 'dodge') {
    // Quick lateral swoosh with air noise
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const noise = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    noise.buffer = buf;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.exponentialRampToValueAtTime(800, now + 0.08);
    filter.Q.value = 1;
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    noise.start(now);
  }
}

// Music toggle
const musicToggleBtn = document.getElementById('music-toggle');
musicToggleBtn.addEventListener('click', (e) => {
  e.preventDefault();
  musicEnabled = !musicEnabled;
  musicToggleBtn.innerHTML = musicEnabled ? '&#x1F50A;' : '&#x1F507;';
  if (musicEnabled) {
    if (state && state.running) playBgMusic();
    else if (window._introAudio && !window._introStopped && !document.getElementById('start-screen').classList.contains('hidden')) {
      window._introAudio.play().catch(() => {});
    }
  } else {
    bgMusic.pause();
    if (window._introAudio) window._introAudio.pause();
  }
  musicToggleBtn.blur(); // prevent spacebar from re-triggering
});
// Prevent spacebar/enter from activating the toggle
musicToggleBtn.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') e.preventDefault();
});

// ─────────────────────────────────────────────
// CACHED DOM ELEMENTS (avoid getElementById every frame)
// ─────────────────────────────────────────────
const domScore = document.getElementById('score');
const domDistance = document.getElementById('distance');
const domComboDisplay = document.getElementById('combo-display');
const domComboCount = document.getElementById('combo-count');
const domComboBar = document.getElementById('combo-bar');
const domComboBarContainer = document.getElementById('combo-bar-container');

// ─────────────────────────────────────────────
// GAME CONFIG
// ─────────────────────────────────────────────
const LANE_WIDTH = 4;
const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
const ROAD_WIDTH = 16;
const ROAD_SEGMENT_LENGTH = 200;
const SEGMENT_COUNT = 6;
const BASE_SPEED = 30;
const MAX_SPEED = 70;
const SPEED_INCREASE = 0.5; // per second
const JUMP_FORCE = 14;
const GRAVITY = 35;
const OBSTACLE_SPACING = 20;
const DOCUMENT_SPACING = 12;

// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
// Detect mobile for performance scaling
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768;

scene.fog = isMobile ? new THREE.Fog(0x87CEEB, 60, 180) : new THREE.Fog(0x87CEEB, 80, 250);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, isMobile ? 200 : 300);
const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, isMobile ? 0.85 : 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(30, 50, 30);
dirLight.castShadow = !isMobile;
if (!isMobile) {
  dirLight.shadow.mapSize.set(512, 512);
  dirLight.shadow.camera.left = -25;
  dirLight.shadow.camera.right = 25;
  dirLight.shadow.camera.top = 25;
  dirLight.shadow.camera.bottom = -25;
}
scene.add(dirLight);

// ─────────────────────────────────────────────
// MATERIALS
// ─────────────────────────────────────────────
const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.8 });
const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
const buildingMats = [
  new THREE.MeshStandardMaterial({ color: 0x8899aa }),

// Canvas texture for building signs
function createTextTexture(text, fontSize, color, bgColor, width, height) {
  const canvas = document.createElement('canvas');
  canvas.width = width || 512;
  canvas.height = height || 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor || '#b8860b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = color || '#ffd700';
  ctx.font = `bold ${fontSize || 48}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

// Simple procedural run animation
function animateCharacter(character, time, isGrounded) {
  const leftArm = character.getObjectByName('leftArm');
  const rightArm = character.getObjectByName('rightArm');
  const leftLeg = character.getObjectByName('leftLeg');
  const rightLeg = character.getObjectByName('rightLeg');
  if (!leftArm) return; // custom character without named parts

  const swing = isGrounded ? Math.sin(time * 12) * 0.6 : 0;
  if (leftArm) leftArm.rotation.x = swing;
  if (rightArm) rightArm.rotation.x = -swing;
  if (leftLeg) leftLeg.rotation.x = -swing;
  if (rightLeg) rightLeg.rotation.x = swing;
}

  // Helper: create a thick oval chain link using TubeGeometry
  function createChainLink(mat) {
    // Oval path — wider and taller for visible interlocking
    const hw = 0.035, hh = 0.055, cr = 0.025;
    const pts = [];
    const s = 6;
    for (let i = 0; i <= s; i++) { const a = -Math.PI/2 + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(hw-cr+cr*Math.cos(a), hh-cr+cr*Math.sin(a), 0)); }
    for (let i = 0; i <= s; i++) { const a = 0 + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(-hw+cr+cr*Math.cos(a), hh-cr+cr*Math.sin(a), 0)); }
    for (let i = 0; i <= s; i++) { const a = Math.PI/2 + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(-hw+cr+cr*Math.cos(a), -hh+cr+cr*Math.sin(a), 0)); }
    for (let i = 0; i <= s; i++) { const a = Math.PI + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(hw-cr+cr*Math.cos(a), -hh+cr+cr*Math.sin(a), 0)); }
    const curve = new THREE.CatmullRomCurve3(pts, true);
    // Thick tube for chunky metal look
    const geo = new THREE.TubeGeometry(curve, 24, 0.014, 8, true);
    return new THREE.Mesh(geo, mat);

    }
    // Lock box on outer side
    const lockBox = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.07, 0.06), cuffMat);
    lockBox.position.set(side * 0.1, -0.42, 0.08);

    // Keyhole

    keyhole.position.set(side * 0.1, -0.42, 0.115);
    keyhole.rotation.x = Math.PI / 2;
    forearmPivot.add(keyhole);
    // Wrist marker for chain positioning
    const wristMarker = new THREE.Object3D();
    wristMarker.position.set(0, -0.42, 0);
    wristMarker.name = side === -1 ? 'zLeftWrist' : 'zRightWrist';
    forearmPivot.add(wristMarker);

    // Hand — open grabbing palm
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.15, 0.1), zombieHandMat);
    hand.position.set(0, -0.52, 0);
    hand.name = side === -1 ? 'zLeftHand' : 'zRightHand';

    // Clawed fingers — 4 bony fingers

  // Chain connecting the two handcuffs — interlocking oval links

  const CHAIN_LINK_COUNT = 12; // more links, spaced tight to interlock

    shoe.position.set(side * 0.22, 0.05, -0.03);
    group.add(shoe);
  }

  return group;
}

function animateZombie(zombie, time) {
  const la = zombie.getObjectByName('zLeftArm');
  const ra = zombie.getObjectByName('zRightArm');
  const ll = zombie.getObjectByName('zLeftLeg');
  const rl = zombie.getObjectByName('zRightLeg');
  if (!la) return;

  // Periodic grab lunge — every ~2.5s, one arm does a fast grab
  const grabCycle = time % 2.5;
  const isGrabbing = grabCycle < 0.4;
  const grabSide = Math.floor(time / 2.5) % 2 === 0 ? 1 : -1;
  const grabIntensity = isGrabbing ? Math.sin(grabCycle / 0.4 * Math.PI) : 0;

  // Base shamble sway
  const lurch = Math.sin(time * 8) * 0.3;

  // Arm pivots — rotate from shoulder (base is 1.4 = arms forward toward player)
  let laRot = 1.4 + lurch * 0.35;
  let raRot = 1.4 - lurch * 0.35;
  if (grabSide === -1) laRot += grabIntensity * 0.6;
  else raRot += grabIntensity * 0.6;
  la.rotation.x = laRot;
  ra.rotation.x = raRot;

  // Forearm pivots — child of arm, so rotation is relative
  const lfa = zombie.getObjectByName('zLeftForearm');
  const rfa = zombie.getObjectByName('zRightForearm');
  if (lfa) {
    lfa.rotation.x = 0.3 + Math.sin(time * 10) * 0.2 + (grabSide === -1 ? grabIntensity * 0.5 : 0);
    rfa.rotation.x = 0.3 - Math.sin(time * 10) * 0.2 + (grabSide === 1 ? grabIntensity * 0.5 : 0);
  }

  // Hands — child of forearm, rotation is relative
  const lh = zombie.getObjectByName('zLeftHand');
  const rh = zombie.getObjectByName('zRightHand');
  if (lh) {
    lh.rotation.x = Math.sin(time * 12) * 0.25 + (grabSide === -1 ? grabIntensity * 0.6 : 0);
    rh.rotation.x = -Math.sin(time * 12) * 0.25 + (grabSide === 1 ? grabIntensity * 0.6 : 0);
  }

  // Shambling legs
  ll.rotation.x = -lurch;
  rl.rotation.x = lurch;

  // Head — tracks grab, lurches forward
  const head = zombie.getObjectByName('zHead');
  if (head) {
    head.rotation.z = Math.sin(time * 5) * 0.18 + grabIntensity * grabSide * 0.15;
    head.rotation.x = Math.sin(time * 3) * 0.12 - 0.1 - grabIntensity * 0.2;
  }

  // Update chain between wrists — links tightly spaced and interlocking
  const lw = zombie.getObjectByName('zLeftWrist');
  const rw = zombie.getObjectByName('zRightWrist');
  const chain = zombie.getObjectByName('zChain');
  if (lw && rw && chain) {
    const lwPos = new THREE.Vector3();
    const rwPos = new THREE.Vector3();
    lw.getWorldPosition(lwPos);
    rw.getWorldPosition(rwPos);
    zombie.worldToLocal(lwPos);
    zombie.worldToLocal(rwPos);
    const dir = new THREE.Vector3().subVectors(rwPos, lwPos);
    const dist = dir.length();
    const norm = dir.clone().normalize();
    // Direction angles for orienting links along the chain
    const chainYaw = Math.atan2(norm.x, norm.z);
    const links = chain.children;
    for (let i = 0; i < links.length; i++) {
      const t = links.length > 1 ? i / (links.length - 1) : 0.5;
      // Catenary sag
      const sag = Math.sin(t * Math.PI) * (0.1 + dist * 0.06);
      const px = lwPos.x + dir.x * t;
      const py = lwPos.y + dir.y * t - sag;
      const pz = lwPos.z + dir.z * t;
      links[i].position.set(px, py, pz);
      // Both orientations vertical (visible from camera), 90° apart
      if (i % 2 === 0) {
        links[i].rotation.set(0, chainYaw, 0);
      } else {
        links[i].rotation.set(0, chainYaw + Math.PI / 2, 0);
      }
    }
  }
}

function createRoadSegment(zOffset) {
  const seg = new THREE.Group();

  // Road surface
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEGMENT_LENGTH),
    roadMat
  );
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0.01, -ROAD_SEGMENT_LENGTH / 2);
  road.receiveShadow = true;
  seg.add(road);

  // Sidewalks
  for (let side of [-1, 1]) {
    const sw = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.2, ROAD_SEGMENT_LENGTH),
      sidewalkMat
    );
    sw.position.set(side * (ROAD_WIDTH / 2 + 1.5), 0.1, -ROAD_SEGMENT_LENGTH / 2);
    sw.receiveShadow = true;
    seg.add(sw);
  }

  // Lane divider lines
  for (let i = -1; i <= 1; i += 2) {
    for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 6) {
      const line = new THREE.Mesh(
        new THREE.PlaneGeometry(0.2, 3),
        lineMat
      );
      line.rotation.x = -Math.PI / 2;
      line.position.set(i * LANE_WIDTH / 2 + i * LANE_WIDTH / 2, 0.02, -z);
      seg.add(line);
    }
  }

  seg.position.z = zOffset;
  return seg;
}

function createBuilding(x, z, side) {
  const group = new THREE.Group();

  const width = 4 + Math.random() * 6;
  const height = 10 + Math.random() * 40;
  const depth = 4 + Math.random() * 6;

  const mat = buildingMats[Math.floor(Math.random() * buildingMats.length)];
  const building = new THREE.Mesh(
    new THREE.BoxGeometry(width, height, depth),
    mat
  );
  building.position.set(x + side * (width / 2), height / 2, z);
  building.castShadow = true;
  building.receiveShadow = true;
  group.add(building);

  // Windows
  const floors = Math.floor(height / 3);
  const cols = Math.max(1, Math.floor(width / 2));
  for (let f = 0; f < floors; f++) {
    for (let c = 0; c < cols; c++) {
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(0.8, 1.2),
        windowMat
      );
      const wx = building.position.x - width / 2 + 1 + c * (width / cols);
      const wy = 2 + f * 3;
      win.position.set(wx, wy, building.position.z + depth / 2 + 0.01);
      if (side > 0) {
        win.position.x = building.position.x + width / 2 - 1 - c * (width / cols);
        win.position.z = building.position.z - depth / 2 - 0.01;
        win.rotation.y = Math.PI;
      }
      group.add(win);
    }
  }

  return group;
}

// Progress-aware transition road (0 = full city, 1 = full island)
let transitionProgress = 0;

function createTransitionRoadSegment(zOffset) {
  const t = getTransitionT();
  const seg = new THREE.Group();

  // Blend road color: dark asphalt -> sandy
  const roadColor = new THREE.Color(0x333333).lerp(new THREE.Color(0xd4c4a1), t);
  const transRoadMat = new THREE.MeshStandardMaterial({ color: roadColor, roughness: 0.9 });
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEGMENT_LENGTH),
    transRoadMat
  );
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0.01, -ROAD_SEGMENT_LENGTH / 2);
  road.receiveShadow = true;
  seg.add(road);

  // Lane lines fade out
  const lineOpacity = 1 - t;
  if (lineOpacity > 0.1) {
    const lineColor = new THREE.Color(0xffffff).lerp(new THREE.Color(0xddddbb), t);
    const fadedLineMat = new THREE.MeshStandardMaterial({ color: lineColor, roughness: 0.5, transparent: true, opacity: lineOpacity });
    for (let i = -1; i <= 1; i += 2) {
      for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 6 + t * 4) {
        const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2 * (1 - t * 0.5), 3 * (1 - t * 0.3)), fadedLineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(i * LANE_WIDTH / 2 + i * LANE_WIDTH / 2, 0.02, -z);
        seg.add(line);
      }
    }
  }

  // Sidewalks shrink and fade into sandy shoulders
  if (t < 0.7) {
    const swColor = new THREE.Color(0x999999).lerp(new THREE.Color(0xddc9a0), t / 0.7);
    const swHeight = 0.2 * (1 - t);
    for (let side of [-1, 1]) {
      const sw = new THREE.Mesh(
        new THREE.BoxGeometry(3, Math.max(0.02, swHeight), ROAD_SEGMENT_LENGTH),
        new THREE.MeshStandardMaterial({ color: swColor, roughness: 0.8 })
      );
      sw.position.set(side * (ROAD_WIDTH / 2 + 1.5), swHeight / 2, -ROAD_SEGMENT_LENGTH / 2);
      seg.add(sw);
    }
  }

  // Shoulders transition: near road = sand/beach, far = ocean
  // Near-road sandy shoulder (narrow strip)
  const beachColor = new THREE.Color(0x333333).lerp(new THREE.Color(0xf5deb3), t);
  for (let side of [-1, 1]) {
    const shoulder = new THREE.Mesh(
      new THREE.PlaneGeometry(8, ROAD_SEGMENT_LENGTH),
      new THREE.MeshStandardMaterial({ color: beachColor, roughness: 0.95 })
    );
    shoulder.rotation.x = -Math.PI / 2;
    shoulder.position.set(side * (ROAD_WIDTH / 2 + 4), 0.005, -ROAD_SEGMENT_LENGTH / 2);
    seg.add(shoulder);
  }

  // Water starts appearing at edges (early transition)
  if (t > 0.3) {
    const waterOpacity = Math.min(1, (t - 0.3) / 0.5) * 0.85;
    const transWaterMat = new THREE.MeshStandardMaterial({
      color: 0x006994, roughness: 0.2, metalness: 0.3,
      transparent: true, opacity: waterOpacity
    });
    for (let side of [-1, 1]) {
      const water = new THREE.Mesh(
        new THREE.PlaneGeometry(500, ROAD_SEGMENT_LENGTH + 200),
        transWaterMat
      );
      water.rotation.x = -Math.PI / 2;
      water.position.set(side * (ROAD_WIDTH / 2 + 258), 0.0, -ROAD_SEGMENT_LENGTH / 2);
      seg.add(water);
    }
  }

  seg.position.z = zOffset;
  return seg;
}

function populateTransitionForSegment(segZ) {
  const t = getTransitionT();
  const group = new THREE.Group();
  const baseOffset = ROAD_WIDTH / 2 + 3;

  for (let side of [-1, 1]) {
    const spacing = 8 + t * 6; // buildings get more spaced out
    for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += spacing + Math.random() * 4) {
      const roll = Math.random();

      if (roll > t) {
        // City building - gets shorter as transition progresses
        const b = createBuilding(side * baseOffset, segZ - z, side);
        const maxHeight = 1.0 - t * 0.8; // shrinks toward 20%
        b.scale.y = maxHeight * (0.3 + Math.random() * 0.7);
        group.add(b);
      } else {
        // Palm tree - grows taller as transition progresses
        const palm = createPalmTree(
          side * (baseOffset + Math.random() * 3),
          segZ - z
        );
        const palmScale = 0.3 + t * 0.7;
        palm.scale.setScalar(palmScale * (0.7 + Math.random() * 0.3));
        group.add(palm);
      }
    }

    // Sparse boats start appearing late in transition
    if (t > 0.7) {
      for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 50 + Math.random() * 50) {
        if (Math.random() > 0.5) {
          const boat = createBoat(
            side * (ROAD_WIDTH / 2 + 20 + Math.random() * 20),
            segZ - z
          );
          boat.rotation.y = Math.random() * Math.PI * 2;
          group.add(boat);
        }
      }
    }
  }
  return group;
}

function getTransitionT() {
  // Calculate transition progress based on current distance
  // Segments placed far ahead are at distance + forward offset
  const rawT = Math.max(0, Math.min(1, (state.distance - LEVEL2_DISTANCE) / 500));
  return rawT < 0.5 ? 2 * rawT * rawT : 1 - Math.pow(-2 * rawT + 2, 2) / 2;
}

  // Large bright 3D block letters "TRUMP TOWER" on the road-facing side

      ? [faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat]
      : [goldLetterMat, faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat];
    const letterMesh = new THREE.Mesh(new THREE.BoxGeometry(letterDepth, letterHeight, letterWidth * 0.85), materials);
    const lx = side < 0 ? roadFaceX + letterDepth / 2 + 0.1 : roadFaceX - letterDepth / 2 - 0.1;
    letterMesh.position.set(lx, 10, trumpStartZ + li * letterWidth);
    letterMesh.castShadow = true;
    group.add(letterMesh);
  }

  // "TOWER" - 5 letters below
  const towerLetters = 'TOWER';
  const towerTotalW = towerLetters.length * letterWidth;
  const towerStartZ = building.position.z - towerTotalW / 2 + letterWidth / 2;

  for (let li = 0; li < towerLetters.length; li++) {
    const charTex = createTextTexture(towerLetters[li], 200, '#ffffff', '#DAA520', 256, 256);
    const faceMat = new THREE.MeshStandardMaterial({ map: charTex, metalness: 0.8, roughness: 0.1, emissive: 0xffd700, emissiveIntensity: 0.2 });
    const materials = side < 0
      ? [faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat]
      : [goldLetterMat, faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat];
    const letterMesh = new THREE.Mesh(new THREE.BoxGeometry(letterDepth, letterHeight * 0.85, letterWidth * 0.85), materials);
    const lx = side < 0 ? roadFaceX + letterDepth / 2 + 0.1 : roadFaceX - letterDepth / 2 - 0.1;
    letterMesh.position.set(lx, 7, towerStartZ + li * letterWidth);
    letterMesh.castShadow = true;
    group.add(letterMesh);

  // Gold spire on top

  if (type === 0) {
    // Realistic car
    const carGroup = new THREE.Group();

    // Pick a realistic car color
    const carColors = [0x1a1a2e, 0xc0c0c0, 0x8b0000, 0x1c3d6e, 0x2d2d2d, 0xf5f5dc, 0x4a0e0e, 0x0a3d0a];
    const carColor = carColors[Math.floor(Math.random() * carColors.length)];
    const carPaint = new THREE.MeshStandardMaterial({ color: carColor, roughness: 0.3, metalness: 0.6 });

    // Main body (lower)
    const bodyLower = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.6, 4.0), carPaint);
    bodyLower.position.y = 0.5;
    bodyLower.castShadow = true;
    carGroup.add(bodyLower);

    // Hood (front slope)
    const hood = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 1.2), carPaint);
    hood.position.set(0, 0.85, -1.2);
    hood.rotation.x = 0.1;
    hood.castShadow = true;
    carGroup.add(hood);

    // Trunk (rear)
    const trunk = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 0.9), carPaint);
    trunk.position.set(0, 0.85, 1.3);
    trunk.rotation.x = -0.08;
    trunk.castShadow = true;
    carGroup.add(trunk);

    // Cabin
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.05, metalness: 0.3, transparent: true, opacity: 0.6 });
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.7, 1.8), glassMat);
    cabin.position.set(0, 1.2, 0);
    cabin.castShadow = true;
    carGroup.add(cabin);

    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.08, 1.8), carPaint);
    roof.position.set(0, 1.56, 0);
    carGroup.add(roof);

    // Windshield (front glass - angled)
    const windshield = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.75), glassMat);
    windshield.position.set(0, 1.2, -0.91);
    windshield.rotation.x = 0.25;
    carGroup.add(windshield);

    // Rear window
    const rearWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.6), glassMat);
    rearWindow.position.set(0, 1.2, 0.91);
    rearWindow.rotation.x = -0.2;
    rearWindow.rotation.y = Math.PI;
    carGroup.add(rearWindow);

    // Headlights
    const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffee, emissive: 0xffffaa, emissiveIntensity: 0.5 });
    for (let side of [-0.7, 0.7]) {
      const hl = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.05), headlightMat);
      hl.position.set(side, 0.6, -2.01);
      carGroup.add(hl);
    }

    // Taillights
    const taillightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.4 });
    for (let side of [-0.7, 0.7]) {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.05), taillightMat);
      tl.position.set(side, 0.6, 2.01);
      carGroup.add(tl);
    }

    // Bumpers
    const bumperMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });
    const frontBumper = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.15), bumperMat);
    frontBumper.position.set(0, 0.3, -2.05);
    carGroup.add(frontBumper);
    const rearBumper = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.15), bumperMat);
    rearBumper.position.set(0, 0.3, 2.05);
    carGroup.add(rearBumper);

    // Grille
    const grilleMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.8 });
    const grille = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.05), grilleMat);
    grille.position.set(0, 0.45, -2.02);
    carGroup.add(grille);

    // Side mirrors
    for (let side of [-1, 1]) {
      const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.2), bumperMat);
      mirror.position.set(side * 1.1, 1.1, -0.3);
      carGroup.add(mirror);
    }

    // Wheels with rims
    const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
    const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.9 });
    for (let wx of [-0.95, 0.95]) {
      for (let wz of [-1.2, 1.2]) {
        // Tire
        const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.25, 16), tireMat);
        tire.rotation.z = Math.PI / 2;
        tire.position.set(wx, 0.32, wz);
        carGroup.add(tire);
        // Rim
        const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.26, 8), rimMat);
        rim.rotation.z = Math.PI / 2;
        rim.position.set(wx, 0.32, wz);
        carGroup.add(rim);
      }
    }

    // Wheel arches (dark indents)
    for (let wx of [-0.85, 0.85]) {
      for (let wz of [-1.2, 1.2]) {
        const arch = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.45, 0.7), bumperMat);
        arch.position.set(wx > 0 ? 1.0 : -1.0, 0.42, wz);
        carGroup.add(arch);
      }
    }

    mesh = carGroup;
    mesh.userData.height = 1.6;
  } else if (type === 1) {
    // Barrier
    const barrier = new THREE.Mesh(
      new THREE.BoxGeometry(3.5, 1.2, 0.5),
      new THREE.MeshStandardMaterial({ color: 0xff8800 })
    );
    barrier.position.y = 0.6;
    barrier.castShadow = true;

    // Stripes
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(3.6, 0.15, 0.52),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    stripe.position.y = 0.8;
    const grp = new THREE.Group();
    grp.add(barrier);
    grp.add(stripe);
    mesh = grp;
    mesh.userData.height = 1.2;
  } else {
    // Traffic cones cluster
    const coneGroup = new THREE.Group();
    for (let i = -1; i <= 1; i++) {
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.25, 0.8, 8),
        new THREE.MeshStandardMaterial({ color: 0xff6600 })
      );
      cone.position.set(i * 0.6, 0.4, 0);
      cone.castShadow = true;
      coneGroup.add(cone);
    }
    mesh = coneGroup;
    mesh.userData.height = 0.8;
  }

  mesh.position.set(LANES[lane], 0, z);
  mesh.userData.lane = lane;
  mesh.userData.isObstacle = true;
  mesh.userData.bbox = new THREE.Box3();
  return mesh;
}

// Island-specific obstacles
function createIslandObstacle(lane, z, forceType) {
  // type 3 = crime scene tape, only spawned via forceType from spawnObstacles
  const type = forceType !== undefined ? forceType : Math.floor(Math.random() * 3);
  let mesh;

  if (type === 0) {
    // Boulder / rock cluster
    const rockGroup = new THREE.Group();
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.9 });
    const darkRockMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.95 });

    // Main boulder
    const mainRock = new THREE.Mesh(new THREE.SphereGeometry(0.8, 7, 6), rockMat);
    mainRock.scale.set(1.2, 0.8, 1.0);
    mainRock.position.y = 0.6;
    mainRock.castShadow = true;
    rockGroup.add(mainRock);

    // Smaller rocks around it
    for (let i = 0; i < 3; i++) {
      const smallRock = new THREE.Mesh(
        new THREE.SphereGeometry(0.25 + Math.random() * 0.2, 6, 5),
        Math.random() > 0.5 ? rockMat : darkRockMat
      );
      smallRock.position.set(
        (Math.random() - 0.5) * 1.5,
        0.2,
        (Math.random() - 0.5) * 1.2
      );
      smallRock.scale.y = 0.6 + Math.random() * 0.4;
      smallRock.castShadow = true;
      rockGroup.add(smallRock);
    }
    mesh = rockGroup;
    mesh.userData.height = 1.4;

  } else if (type === 1) {
    // Fallen tree / log
    const logGroup = new THREE.Group();
    const barkMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.9 });
    const innerWoodMat = new THREE.MeshStandardMaterial({ color: 0xC4A46C, roughness: 0.8 });

    // Main log (lying across the road)
    const log = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 3.5, 8), barkMat);
    log.rotation.z = Math.PI / 2;
    log.position.y = 0.4;
    log.castShadow = true;
    logGroup.add(log);

    // Cross-section circle (cut end)
    const endCap = new THREE.Mesh(new THREE.CircleGeometry(0.35, 8), innerWoodMat);
    endCap.position.set(1.76, 0.4, 0);
    endCap.rotation.y = Math.PI / 2;
    logGroup.add(endCap);

    // Some broken branches
    for (let i = 0; i < 2; i++) {
      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.08, 1.2, 6),
        barkMat
      );
      branch.position.set(
        (Math.random() - 0.5) * 2,
        0.6,
        0.3 + i * 0.3
      );
      branch.rotation.set(0.3, Math.random(), 0.8);
      logGroup.add(branch);
    }

    // Leaves scattered
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, side: THREE.DoubleSide });
    for (let i = 0; i < 4; i++) {
      const leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.25), leafMat);
      leaf.position.set(
        (Math.random() - 0.5) * 2.5,
        0.02,
        (Math.random() - 0.5) * 1.5
      );
      leaf.rotation.x = -Math.PI / 2;
      leaf.rotation.z = Math.random() * Math.PI;
      logGroup.add(leaf);
    }
    mesh = logGroup;
    mesh.userData.height = 0.8;

  } else if (type === 2) {
    // Rock pile (smaller)
    const pileGroup = new THREE.Group();
    const rockColors = [0x888888, 0x666666, 0x999988, 0x776655];
    for (let i = 0; i < 5; i++) {
      const rock = new THREE.Mesh(
        new THREE.SphereGeometry(0.2 + Math.random() * 0.15, 6, 5),
        new THREE.MeshStandardMaterial({ color: rockColors[Math.floor(Math.random() * rockColors.length)], roughness: 0.9 })
      );
      rock.position.set(
        (Math.random() - 0.5) * 1.5,
        0.15 + Math.random() * 0.1,
        (Math.random() - 0.5) * 1.0
      );
      rock.scale.y = 0.5 + Math.random() * 0.5;
      rock.castShadow = true;
      pileGroup.add(rock);
    }
    mesh = pileGroup;
    mesh.userData.height = 0.5;

  } else {
    // Crime scene tape stretched across the road
    const tapeGroup = new THREE.Group();
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.7 });

    // Two metal poles on either side of the road
    const poleRadius = 0.08;
    const poleHeight = 1.8;
    for (let side of [-1, 1]) {
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(poleRadius, poleRadius, poleHeight, 8),
        poleMat
      );
      pole.position.set(side * (ROAD_WIDTH / 2 - 1), poleHeight / 2, 0);
      pole.castShadow = true;
      tapeGroup.add(pole);

      // Pole base
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.3, 0.1, 8),
        poleMat
      );
      base.position.set(side * (ROAD_WIDTH / 2 - 1), 0.05, 0);
      tapeGroup.add(base);

      // Pole top cap
      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 8, 6),
        poleMat
      );
      cap.position.set(side * (ROAD_WIDTH / 2 - 1), poleHeight, 0);
      tapeGroup.add(cap);
    }

    // Yellow tape — canvas texture with bold black "CRIME SCENE" text
    const tapeCanvas = document.createElement('canvas');
    tapeCanvas.width = 2048;
    tapeCanvas.height = 128;
    const tctx = tapeCanvas.getContext('2d');
    tctx.fillStyle = '#FFD700';
    tctx.fillRect(0, 0, tapeCanvas.width, tapeCanvas.height);
    // Bold black text repeating
    tctx.fillStyle = '#000000';
    tctx.font = '900 72px Arial, sans-serif';
    tctx.textBaseline = 'middle';
    const tapeText = 'CRIME SCENE   DO NOT CROSS   ';
    const tw = tctx.measureText(tapeText).width;
    for (let x = 0; x < tapeCanvas.width + tw; x += tw) {
      tctx.fillText(tapeText, x, tapeCanvas.height / 2);
    }
    // Thick black border lines top and bottom
    tctx.fillStyle = '#000000';
    tctx.fillRect(0, 0, tapeCanvas.width, 10);
    tctx.fillRect(0, tapeCanvas.height - 10, tapeCanvas.width, 10);

    const tapeTex = new THREE.CanvasTexture(tapeCanvas);
    tapeTex.wrapS = THREE.RepeatWrapping;
    tapeTex.repeat.set(3, 1);
    const tapeMat = new THREE.MeshBasicMaterial({
      map: tapeTex,
      side: THREE.DoubleSide,
    });

    // Single thick tape strip at waist height, pole-to-pole width
    const poleSpan = (ROAD_WIDTH / 2 - 1) * 2; // distance between poles
    const tape = new THREE.Mesh(
      new THREE.PlaneGeometry(poleSpan, 0.4),
      tapeMat
    );
    tape.position.set(0, 1.0, 0);
    tapeGroup.add(tape);

    mesh = tapeGroup;
    mesh.userData.height = 1.3;
    mesh.userData.isCrimeSceneTape = true; // flag for wide collision
  }

  // Crime scene tape always centered on road, other obstacles use lane
  const xPos = mesh.userData.isCrimeSceneTape ? 0 : LANES[lane];
  mesh.position.set(xPos, 0, z);
  mesh.userData.lane = lane;
  mesh.userData.isObstacle = true;
  mesh.userData.bbox = new THREE.Box3();
  return mesh;
}

// PAPER DOCUMENTS (Collectibles)
// ─────────────────────────────────────────────
function createDocument(lane, z) {
  const group = new THREE.Group();

  // Paper sheet
  const paper = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 1.1),
    documentMat
  );
  paper.castShadow = true;
  group.add(paper);

  // Text lines on paper
  const linesMat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
  for (let i = 0; i < 5; i++) {
    const textLine = new THREE.Mesh(
      new THREE.PlaneGeometry(0.5 + Math.random() * 0.2, 0.03),
      linesMat
    );
    textLine.position.set(0, 0.3 - i * 0.15, 0.01);
    group.add(textLine);
  }

  // Corner fold
  const foldGeo = new THREE.BufferGeometry();
  const foldVerts = new Float32Array([
    0.4, 0.55, 0,
    0.4, 0.35, 0,
    0.2, 0.55, 0,
  ]);
  foldGeo.setAttribute('position', new THREE.BufferAttribute(foldVerts, 3));
  foldGeo.computeVertexNormals();
  const fold = new THREE.Mesh(foldGeo, new THREE.MeshStandardMaterial({
    color: 0xeeeecc, side: THREE.DoubleSide
  }));
  group.add(fold);

  // Glow ring
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.7, 0.85, 16),
    new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
  );
  group.add(ring);

  group.position.set(LANES[lane], 1.5, z);
  group.userData.isDocument = true;
  group.userData.lane = lane;
  group.userData.collected = false;
  return group;
}

function createStreetlight(x, z) {
  const group = new THREE.Group();
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 5, 8), poleMat);
  pole.position.y = 2.5;
  group.add(pole);

  const arm = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 0.08), poleMat);
  arm.position.set(x > 0 ? -0.75 : 0.75, 5, 0);
  group.add(arm);

  const lampMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffff88, emissiveIntensity: 0.5 });
  const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), lampMat);
  lamp.position.set(x > 0 ? -1.5 : 1.5, 4.95, 0);
  group.add(lamp);

  group.position.set(x, 0, z);
  return group;
}

// ─────────────────────────────────────────────
// INIT WORLD
// ─────────────────────────────────────────────
function initWorld() {
  // Clear old
  roadSegments.forEach(s => scene.remove(s));
  buildingGroups.forEach(g => scene.remove(g));
  obstacles.forEach(o => scene.remove(o));
  documents.forEach(d => scene.remove(d));
  streetlights.forEach(s => scene.remove(s));
  roadSegments.length = 0;
  buildingGroups.length = 0;
  obstacles.length = 0;
  documents.length = 0;
  streetlights.length = 0;

  if (player) scene.remove(player);

  // Reset level and distance BEFORE creating segments
  transitionProgress = 1;
  state.distance = 0;

  // Island sky/fog/ground/lighting
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = isMobile ? new THREE.Fog(0x87CEEB, 80, 220) : new THREE.Fog(0x87CEEB, 120, 350);
  // Ground stays invisible - ocean/beach planes cover the surface
  ambientLight.color.set(0xfff8e7);
  ambientLight.intensity = 0.9;
  dirLight.color.set(0xfff4d6);
  dirLight.intensity = 1.3;

  // Road segments (start two behind player to cover camera view)
  for (let i = -2; i < SEGMENT_COUNT; i++) {
    const z = -i * ROAD_SEGMENT_LENGTH;
    const seg = createLevelRoadSegment(z);
    scene.add(seg);
    roadSegments.push(seg);

    // Populate scenery for all segments — keeps arrays aligned with roadSegments
    const buildings = populateBuildingsForSegment(z);
    scene.add(buildings);
    buildingGroups.push(buildings);
  }

  // Player
  player = createCharacter();
  player.position.set(0, 0, 0);
  player.rotation.y = Math.PI; // face away from camera (running forward)
  scene.add(player);

  // Zombie chaser
  if (zombie) scene.remove(zombie);
  zombie = createZombie();
  zombie.scale.set(1.0, 1.0, 1.0);
  // zombie model is built facing -Z (toward player)
  zombieZ = ZOMBIE_START_Z;
  zombie.position.set(0, 0, zombieZ);
  scene.add(zombie);

  // Camera
  camera.position.set(0, 6, 10);
  camera.lookAt(0, 2, -10);

  // Reset state
  state = {
    running: false,
    speed: BASE_SPEED,
    score: 0,
    distance: 0,
    lane: 1,
    targetX: LANES[1],
    playerY: 0,
    velocityY: 0,
    isGrounded: true,
    gameTime: 0,
    boostTimer: 0,
  };
  nextObstacleZ = -30;
  lastTapeZ = Infinity;
  nextDocumentZ = -15;
  combo = 0;
  comboTimer = 0;
  combo20Played = false;
  combo40Played = false;
  domComboDisplay.classList.remove('active');
  domComboBarContainer.classList.remove('active');

  updateHUD();
}

// ─────────────────────────────────────────────
// SPAWNING
// ─────────────────────────────────────────────
const MIN_TAPE_GAP = 120; // minimum Z distance between crime scene tape spawns
let lastTapeZ = Infinity;

function spawnObstacles(playerZ) {
  while (nextObstacleZ > playerZ - 200) {
    // ~8% chance of crime scene tape — spawns alone across all 3 lanes
    // Enforce minimum gap so two tapes don't spawn close together
    if (Math.random() < 0.08 && (lastTapeZ - nextObstacleZ) >= MIN_TAPE_GAP) {
      const tape = createIslandObstacle(1, nextObstacleZ, 3);
      scene.add(tape);
      obstacles.push(tape);
      lastTapeZ = nextObstacleZ;
      nextObstacleZ -= OBSTACLE_SPACING + Math.random() * 15;
      continue;
    }

    // Normal obstacle spawning — pick 1-2 lanes to block (no crime scene tape)
    const blockedLanes = new Set();
    blockedLanes.add(Math.floor(Math.random() * 3));
    if (Math.random() > 0.5) {
      let second;
      do { second = Math.floor(Math.random() * 3); } while (second === [...blockedLanes][0]);
      blockedLanes.add(second);
    }

    for (const lane of blockedLanes) {
      const obs = (Math.random() > 0.4)
        ? createIslandObstacle(lane, nextObstacleZ)
        : createObstacle(lane, nextObstacleZ);
      scene.add(obs);
      obstacles.push(obs);
    }

    nextObstacleZ -= OBSTACLE_SPACING + Math.random() * 15;
  }
}

function spawnDocuments(playerZ) {
  while (nextDocumentZ > playerZ - 200) {
    const lane = Math.floor(Math.random() * 3);
    // Avoid placing on obstacles
    const doc = createDocument(lane, nextDocumentZ);
    scene.add(doc);
    documents.push(doc);
    nextDocumentZ -= DOCUMENT_SPACING + Math.random() * 8;
  }
}

const keys = {};

  keys[e.code] = true;

  if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
  if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();

});
window.addEventListener('keyup', (e) => keys[e.code] = false);

function moveLeft() {
  if (state.lane > 0) {
    state.lane--;
    state.targetX = LANES[state.lane];
    playSfx('dodge');
  }
}
function moveRight() {
  if (state.lane < 2) {
    state.lane++;
    state.targetX = LANES[state.lane];
    playSfx('dodge');
  }
}
function jump() {
  state.velocityY = JUMP_FORCE;
  state.isGrounded = false;
  playSfx('jump');
}

// Touch / swipe — responsive with lower thresholds for mobile
let touchStartX = 0, touchStartY = 0, touchHandled = false;
window.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchHandled = false;
}, { passive: true });
window.addEventListener('touchmove', (e) => {
  if (!state.running || touchHandled) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  const threshold = 25;
  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    touchHandled = true;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) moveLeft();
      else moveRight();
    } else if (dy < 0 && state.isGrounded) {
      jump();
    }
  }
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (!state.running || touchHandled) return;
  // Tap to jump as fallback
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15 && state.isGrounded) {
    jump();
  }
}, { passive: true });

document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); if (state.running) moveLeft(); });
document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); if (state.running) moveRight(); });

// ─────────────────────────────────────────────
// COLLISION
// ─────────────────────────────────────────────
function checkCollisions() {
  const px = player.position.x;
  const py = player.position.y;
  const pz = player.position.z;

  // Obstacles
  for (const obs of obstacles) {
    const oz = obs.position.z;
    const ox = obs.position.x;
    const xThreshold = obs.userData.isCrimeSceneTape ? ROAD_WIDTH / 2 : 1.5;
    if (Math.abs(pz - oz) < 1.8 && Math.abs(px - ox) < xThreshold && py < (obs.userData.height || 1.5)) {
      return true; // collision
    }
  }
  return false;
}

function checkDocumentPickup() {
  const px = player.position.x;
  const pz = player.position.z;

  for (const doc of documents) {
    if (doc.userData.collected) continue;
    const dz = doc.position.z;
    const dx = doc.position.x;
    if (Math.abs(pz - dz) < 1.5 && Math.abs(px - dx) < 1.5) {
      doc.userData.collected = true;
      scene.remove(doc);
      state.score++;
      playSfx('collect');
      // Win condition
      if (state.score >= WIN_SCORE) { gameWin(); return; }
      // Boost: push zombie back and speed up temporarily
      zombieZ += 1.5;
      if (zombieZ > ZOMBIE_START_Z) zombieZ = ZOMBIE_START_Z;
      state.boostTimer = 0.6;
      // Combo system
      combo++;
      comboTimer = COMBO_TIMEOUT;
      if (combo >= 2) {
        showCombo(combo);
      }
      if (combo >= 40 && !combo40Played && musicEnabled) {
        combo40Played = true;
        combo40Clip.currentTime = 0;
        combo40Clip.play().catch(() => {});
      } else if (combo >= 20 && !combo20Played && musicEnabled) {
        combo20Played = true;
        comboClip.currentTime = 0;
        comboClip.play().catch(() => {});
      }
      // Particle flash effect
      flashCollect(dx, 1.5, dz);
    }
  }
}

function flashCollect(x, y, z) {
  const geo = new THREE.SphereGeometry(0.5, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.8 });
  const flash = new THREE.Mesh(geo, mat);
  flash.position.set(x, y, z);
  scene.add(flash);

  let scale = 1;
  const expand = () => {
    scale += 0.15;
    mat.opacity -= 0.06;
    flash.scale.set(scale, scale, scale);
    if (mat.opacity > 0) requestAnimationFrame(expand);
    else scene.remove(flash);
  };
  expand();
}

let comboDisplayTimeout = null;
function showCombo(count) {
  const el = domComboDisplay;
  const countEl = domComboCount;
  const barContainer = domComboBarContainer;

  // Scale and color based on combo level
  let color = '#ffd700';
  // Use vw-based sizing that caps at reasonable max
  const vw = window.innerWidth * 0.01;
  let size = Math.min(72, Math.min(36 + count * 2, vw * 10));
  if (count >= 20) { color = '#ff2222'; size = Math.min(72, vw * 10); }
  else if (count >= 10) { color = '#ff6b35'; size = Math.min(60, vw * 9); }
  else if (count >= 5) { color = '#ffaa00'; size = Math.min(50, vw * 8); }

  countEl.textContent = 'x' + count;
  countEl.style.fontSize = size + 'px';
  countEl.style.color = color;
  el.classList.add('active');
  barContainer.classList.add('active');

  // Pulse animation
  countEl.style.transform = 'scale(1.3)';
  setTimeout(() => { countEl.style.transform = 'scale(1)'; }, 100);

  clearTimeout(comboDisplayTimeout);
  comboDisplayTimeout = setTimeout(() => {
    el.classList.remove('active');
  }, 800);
}

function updateCombo(dt) {
  if (combo > 0) {
    comboTimer -= dt;
    // Update combo bar
    const pct = Math.max(0, comboTimer / COMBO_TIMEOUT) * 100;
    domComboBar.style.width = pct + '%';

    if (comboTimer <= 0) {
      combo = 0;
      combo20Played = false;
      combo40Played = false;
      domComboDisplay.classList.remove('active');
      domComboBarContainer.classList.remove('active');
    }
  }
}

// ─────────────────────────────────────────────
// CLEANUP
// ─────────────────────────────────────────────
function cleanupBehindPlayer(playerZ) {
  // Remove obstacles far behind
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].position.z > playerZ + 20) {
      scene.remove(obstacles[i]);
      obstacles.splice(i, 1);
    }
  }
  // Remove documents far behind
  for (let i = documents.length - 1; i >= 0; i--) {
    if (documents[i].position.z > playerZ + 20) {
      scene.remove(documents[i]);
      documents.splice(i, 1);
    }
  }
  // Recycle road segments — only recycle ONE per frame to avoid stutter
  for (let i = 0; i < roadSegments.length; i++) {
    if (roadSegments[i].position.z > playerZ + ROAD_SEGMENT_LENGTH + 30) {
      const newZ = roadSegments[i].position.z - SEGMENT_COUNT * ROAD_SEGMENT_LENGTH;

      // Replace road segment — add new, defer removal to next frame
      const oldSeg = roadSegments[i];
      const newSeg = createLevelRoadSegment(newZ);
      newSeg.position.z = newZ;
      scene.add(newSeg);
      roadSegments[i] = newSeg;
      requestAnimationFrame(() => scene.remove(oldSeg));

      // Recycle buildings/props — same deferred removal
      const oldBg = buildingGroups[i];
      const newBg = populateBuildingsForSegment(newZ);
      scene.add(newBg);
      buildingGroups[i] = newBg;
      requestAnimationFrame(() => scene.remove(oldBg));

      break; // Only one segment per frame to spread the GPU cost
    }
  }
  // Recycle streetlights
  for (let i = streetlights.length - 1; i >= 0; i--) {
    if (streetlights[i].position.z > playerZ + 30) {
      scene.remove(streetlights[i]);
      streetlights.splice(i, 1);
    }
  }
}
