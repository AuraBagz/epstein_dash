// ─────────────────────────────────────────────
// INIT WORLD
// ─────────────────────────────────────────────
function initWorld() {
  // Clear old
  roadSegments.forEach(s => scene.remove(s));
  buildingGroups.forEach(g => scene.remove(g));
  obstacles.forEach(o => scene.remove(o));
  documents.forEach(d => scene.remove(d));
  streetlights.forEach(s => scene.remove(s));
  roadSegments.length = 0;
  buildingGroups.length = 0;
  obstacles.length = 0;
  documents.length = 0;
  streetlights.length = 0;

  if (player) scene.remove(player);

  // Reset level and distance BEFORE creating segments
  transitionProgress = 1;
  state.distance = 0;

  // Island sky/fog/ground/lighting
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 120, 350);
  // Ground stays invisible - ocean/beach planes cover the surface
  ambientLight.color.set(0xfff8e7);
  ambientLight.intensity = 0.9;
  dirLight.color.set(0xfff4d6);
  dirLight.intensity = 1.3;

  // Road segments (start two behind player to cover camera view)
  for (let i = -2; i < SEGMENT_COUNT; i++) {
    const z = -i * ROAD_SEGMENT_LENGTH;
    const seg = createLevelRoadSegment(z);
    scene.add(seg);
    roadSegments.push(seg);

    // Only populate scenery for forward segments (not behind player)
    if (i >= 0) {
      const buildings = populateBuildingsForSegment(z);
      scene.add(buildings);
      buildingGroups.push(buildings);
    }
  }

  // Player
  player = createCharacter();
  player.position.set(0, 0, 0);
  player.rotation.y = Math.PI; // face away from camera (running forward)
  scene.add(player);

  // Zombie chaser
  if (zombie) scene.remove(zombie);
  zombie = createZombie();
  zombie.scale.set(1.0, 1.0, 1.0);
  // zombie model is built facing -Z (toward player)
  zombieZ = ZOMBIE_START_Z;
  zombie.position.set(0, 0, zombieZ);
  scene.add(zombie);

  // Camera
  camera.position.set(0, 6, 10);
  camera.lookAt(0, 2, -10);

  // Reset state
  state = {
    running: false,
    speed: BASE_SPEED,
    score: 0,
    distance: 0,
    lane: 1,
    targetX: LANES[1],
    playerY: 0,
    velocityY: 0,
    isGrounded: true,
    gameTime: 0,
    boostTimer: 0,
  };
  nextObstacleZ = -30;
  nextDocumentZ = -15;
  combo = 0;
  comboTimer = 0;
  combo20Played = false;
  combo40Played = false;
  document.getElementById('combo-display').classList.remove('active');
  document.getElementById('combo-bar-container').classList.remove('active');

  updateHUD();
}

// ─────────────────────────────────────────────
// SPAWNING
// ─────────────────────────────────────────────
function spawnObstacles(playerZ) {
  while (nextObstacleZ > playerZ - 200) {
    // Pick 1-2 lanes to block
    const blockedLanes = new Set();
    blockedLanes.add(Math.floor(Math.random() * 3));
    if (Math.random() > 0.5) {
      let second;
      do { second = Math.floor(Math.random() * 3); } while (second === [...blockedLanes][0]);
      blockedLanes.add(second);
    }

    for (const lane of blockedLanes) {
      // Mix island obstacles with cars
      const obs = (Math.random() > 0.4)
        ? createIslandObstacle(lane, nextObstacleZ)
        : createObstacle(lane, nextObstacleZ);
      scene.add(obs);
      obstacles.push(obs);
    }

    nextObstacleZ -= OBSTACLE_SPACING + Math.random() * 15;
  }
}

function spawnDocuments(playerZ) {
  while (nextDocumentZ > playerZ - 200) {
    const lane = Math.floor(Math.random() * 3);
    // Avoid placing on obstacles
    const doc = createDocument(lane, nextDocumentZ);
    scene.add(doc);
    documents.push(doc);
    nextDocumentZ -= DOCUMENT_SPACING + Math.random() * 8;
  }
}

// ─────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (!state.running) return;
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
  if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
  if ((e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') && state.isGrounded) jump();
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

function moveLeft() {
  if (state.lane > 0) {
    state.lane--;
    state.targetX = LANES[state.lane];
    playSfx('dodge');
  }
}
function moveRight() {
  if (state.lane < 2) {
    state.lane++;
    state.targetX = LANES[state.lane];
    playSfx('dodge');
  }
}
function jump() {
  state.velocityY = JUMP_FORCE;
  state.isGrounded = false;
  playSfx('jump');
}

// Touch / swipe
let touchStartX = 0, touchStartY = 0;
window.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
window.addEventListener('touchend', (e) => {
  if (!state.running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx < -40) moveLeft();
    else if (dx > 40) moveRight();
  } else if (dy < -40 && state.isGrounded) {
    jump();
  }
});

// Mobile buttons
document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); if (state.running) moveLeft(); });
document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); if (state.running) moveRight(); });
document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if (state.running && state.isGrounded) jump(); });

// ─────────────────────────────────────────────
// HUD
// ─────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('distance').textContent = Math.floor(state.distance);
}

// ─────────────────────────────────────────────
// COLLISION
// ─────────────────────────────────────────────
function checkCollisions() {
  const px = player.position.x;
  const py = player.position.y;
  const pz = player.position.z;

  // Obstacles
  for (const obs of obstacles) {
    const oz = obs.position.z;
    const ox = obs.position.x;
    if (Math.abs(pz - oz) < 1.8 && Math.abs(px - ox) < 1.5 && py < (obs.userData.height || 1.5)) {
      return true; // collision
    }
  }
  return false;
}

function checkDocumentPickup() {
  const px = player.position.x;
  const pz = player.position.z;

  for (const doc of documents) {
    if (doc.userData.collected) continue;
    const dz = doc.position.z;
    const dx = doc.position.x;
    if (Math.abs(pz - dz) < 1.5 && Math.abs(px - dx) < 1.5) {
      doc.userData.collected = true;
      scene.remove(doc);
      state.score++;
      playSfx('collect');
      // Boost: push zombie back and speed up temporarily
      zombieZ += 1.5;
      if (zombieZ > ZOMBIE_START_Z) zombieZ = ZOMBIE_START_Z;
      state.boostTimer = 0.6;
      // Combo system
      combo++;
      comboTimer = COMBO_TIMEOUT;
      if (combo >= 2) {
        showCombo(combo);
      }
      if (combo >= 40 && !combo40Played && musicEnabled) {
        combo40Played = true;
        combo40Clip.currentTime = 0;
        combo40Clip.play().catch(() => {});
      } else if (combo >= 20 && !combo20Played && musicEnabled) {
        combo20Played = true;
        comboClip.currentTime = 0;
        comboClip.play().catch(() => {});
      }
      // Particle flash effect
      flashCollect(dx, 1.5, dz);
    }
  }
}

function flashCollect(x, y, z) {
  const geo = new THREE.SphereGeometry(0.5, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.8 });
  const flash = new THREE.Mesh(geo, mat);
  flash.position.set(x, y, z);
  scene.add(flash);

  let scale = 1;
  const expand = () => {
    scale += 0.15;
    mat.opacity -= 0.06;
    flash.scale.set(scale, scale, scale);
    if (mat.opacity > 0) requestAnimationFrame(expand);
    else scene.remove(flash);
  };
  expand();
}

let comboDisplayTimeout = null;
function showCombo(count) {
  const el = document.getElementById('combo-display');
  const countEl = document.getElementById('combo-count');
  const barContainer = document.getElementById('combo-bar-container');

  // Scale and color based on combo level
  let color = '#ffd700';
  let size = Math.min(72, 36 + count * 2);
  if (count >= 20) { color = '#ff2222'; size = 72; }
  else if (count >= 10) { color = '#ff6b35'; size = 60; }
  else if (count >= 5) { color = '#ffaa00'; size = 50; }

  countEl.textContent = 'x' + count;
  countEl.style.fontSize = size + 'px';
  countEl.style.color = color;
  el.classList.add('active');
  barContainer.classList.add('active');

  // Pulse animation
  countEl.style.transform = 'scale(1.3)';
  setTimeout(() => { countEl.style.transform = 'scale(1)'; }, 100);

  clearTimeout(comboDisplayTimeout);
  comboDisplayTimeout = setTimeout(() => {
    el.classList.remove('active');
  }, 800);
}

function updateCombo(dt) {
  if (combo > 0) {
    comboTimer -= dt;
    // Update combo bar
    const bar = document.getElementById('combo-bar');
    const pct = Math.max(0, comboTimer / COMBO_TIMEOUT) * 100;
    bar.style.width = pct + '%';

    if (comboTimer <= 0) {
      combo = 0;
      combo20Played = false;
      combo40Played = false;
      document.getElementById('combo-display').classList.remove('active');
      document.getElementById('combo-bar-container').classList.remove('active');
    }
  }
}

// ─────────────────────────────────────────────
// CLEANUP
// ─────────────────────────────────────────────
function cleanupBehindPlayer(playerZ) {
  // Remove obstacles far behind
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].position.z > playerZ + 20) {
      scene.remove(obstacles[i]);
      obstacles.splice(i, 1);
    }
  }
  // Remove documents far behind
  for (let i = documents.length - 1; i >= 0; i--) {
    if (documents[i].position.z > playerZ + 20) {
      scene.remove(documents[i]);
      documents.splice(i, 1);
    }
  }
  // Recycle road segments
  for (let i = 0; i < roadSegments.length; i++) {
    if (roadSegments[i].position.z > playerZ + ROAD_SEGMENT_LENGTH) {
      const newZ = roadSegments[i].position.z - SEGMENT_COUNT * ROAD_SEGMENT_LENGTH;

      // Replace road segment with level-appropriate one
      scene.remove(roadSegments[i]);
      roadSegments[i] = createLevelRoadSegment(newZ);
      roadSegments[i].position.z = newZ;
      scene.add(roadSegments[i]);

      // Recycle buildings/props
      scene.remove(buildingGroups[i]);
      buildingGroups[i] = populateBuildingsForSegment(newZ);
      scene.add(buildingGroups[i]);
    }
  }
  // Recycle streetlights
  for (let i = streetlights.length - 1; i >= 0; i--) {
    if (streetlights[i].position.z > playerZ + 30) {
      scene.remove(streetlights[i]);
      streetlights.splice(i, 1);
    }
  }
}

// ─────────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────────
function gameOver() {
  state.running = false;
  playSfx('gameover');
  bgMusic.pause();
  if (musicEnabled) {
    const clip = gameOverClips[Math.floor(Math.random() * gameOverClips.length)];
    clip.currentTime = 0;
    clip.play().catch(() => {});
  }
  document.getElementById('final-score').textContent = state.score;
  document.getElementById('final-distance').textContent = Math.floor(state.distance);
  document.getElementById('game-over-screen').classList.remove('hidden');
  updateEndscreenOverlay();
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
const clock = new THREE.Clock();

function update() {
  requestAnimationFrame(update);

  const dt = Math.min(clock.getDelta(), 0.05);

  if (!state.running) {
    // Idle animation for menu
    if (player) {
      player.rotation.y = Math.PI + Math.sin(Date.now() * 0.001) * 0.2;
    }
    if (zombie) {
      zombie.position.z = ZOMBIE_START_Z;
      animateZombie(zombie, Date.now() * 0.001);
    }
    renderer.render(scene, camera);
    return;
  }

  state.gameTime += dt;

  // Speed increase
  state.speed = Math.min(MAX_SPEED, BASE_SPEED + state.gameTime * SPEED_INCREASE);

  // Boost from collecting documents
  let boostMultiplier = 1;
  if (state.boostTimer > 0) {
    state.boostTimer -= dt;
    boostMultiplier = 1.6; // 60% speed boost
    // Also slow zombie approach during boost
    zombieZ += 0.5 * dt;
  }

  // Combo speed boost (stacks with document boost)
  updateCombo(dt);
  if (combo >= 2) {
    const comboBoost = 1 + Math.min(combo * 0.03, 0.6); // up to 60% extra at 20+ combo
    boostMultiplier *= comboBoost;
    // Combo also pushes zombie back slightly
    if (combo >= 5) zombieZ += 0.2 * dt;
  }

  // Move world toward player (player stays near z=0)
  const moveZ = state.speed * boostMultiplier * dt;
  state.distance += moveZ;

  // Island environment is constant - no transition needed

  // Move all world objects
  for (const seg of roadSegments) seg.position.z += moveZ;
  for (const bg of buildingGroups) bg.position.z += moveZ;
  for (const obs of obstacles) obs.position.z += moveZ;
  for (const doc of documents) {
    doc.position.z += moveZ;
    // Float and spin animation
    if (!doc.userData.collected) {
      doc.rotation.y += dt * 2;
      doc.position.y = 1.5 + Math.sin(state.gameTime * 3 + doc.position.x) * 0.3;
    }
  }
  for (const sl of streetlights) sl.position.z += moveZ;
  ground.position.z = player.position.z;

  // Sun tracks player (stays in the distance)
  sun.position.z = player.position.z - 200;
  sunGlow.position.z = sun.position.z;
  sunHalo.position.z = sun.position.z;
  sunHalo.lookAt(camera.position);

  // Animate clouds - slow drift + track player
  for (const c of clouds) {
    c.position.x += c.userData.speed * dt;
    c.position.z += moveZ * 0.3; // parallax - clouds move slower
    // Wrap clouds that drift too far
    if (c.position.x > 250) c.position.x = -250;
  }

  // Lane movement
  player.position.x += (state.targetX - player.position.x) * 10 * dt;

  // Jump / gravity
  if (!state.isGrounded) {
    state.velocityY -= GRAVITY * dt;
    state.playerY += state.velocityY * dt;
    if (state.playerY <= 0) {
      state.playerY = 0;
      state.velocityY = 0;
      state.isGrounded = true;
    }
  }
  player.position.y = state.playerY;

  // Character animation
  animateCharacter(player, state.gameTime, state.isGrounded);

  // Slight forward lean when running
  player.rotation.x = state.isGrounded ? -0.05 : (state.velocityY > 0 ? -0.15 : 0.1);

  // Zombie chaser - slowly closes in over time
  const zombieGainRate = 0.08 + state.gameTime * 0.008; // slow start, gradually faster
  zombieZ -= zombieGainRate * dt;
  // Zombie follows player's lane with a delay
  zombie.position.x += (player.position.x - zombie.position.x) * 2 * dt;
  zombie.position.z = zombieZ;
  zombie.position.y = Math.abs(Math.sin(state.gameTime * 8)) * 0.15; // slight bounce
  // zombie faces away from camera (chasing player)
  animateZombie(zombie, state.gameTime);

  // Zombie catches player
  if (zombieZ <= ZOMBIE_CLOSE_Z) {
    gameOver();
    return;
  }

  // Camera follow - positioned to see both player and zombie behind
  camera.position.x += (player.position.x * 0.5 - camera.position.x) * 3 * dt;
  camera.position.y = 7 + state.playerY * 0.3;
  camera.position.z = 12;
  camera.lookAt(player.position.x * 0.3, 1.5, -8);
  dirLight.position.x = player.position.x + 30;

  // Spawning
  spawnObstacles(-state.distance - 50);
  spawnDocuments(-state.distance - 30);

  // Collision detection
  if (checkCollisions()) {
    gameOver();
    return;
  }
  checkDocumentPickup();

  // Cleanup
  cleanupBehindPlayer(0);

  updateHUD();
  renderer.render(scene, camera);
}

// ─────────────────────────────────────────────
// START SCREEN OVERLAY SIZING (track image bounds)
// ─────────────────────────────────────────────
(function sizeStartOverlay() {
  const img = document.getElementById('startscreen-img');
  const overlay = document.getElementById('startscreen-overlay');
  const chaseCanvas = document.getElementById('start-chase-canvas');
  if (!img || !overlay) return;

  function fitOverlay() {
    const cw = img.parentElement.clientWidth;
    const ch = img.parentElement.clientHeight;
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const containerRatio = cw / ch;
    let w, h, l, t;
    if (containerRatio > imgRatio) {
      h = ch;
      w = ch * imgRatio;
      l = (cw - w) / 2;
      t = 0;
    } else {
      w = cw;
      h = cw / imgRatio;
      l = 0;
      t = (ch - h) / 2;
    }
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    overlay.style.left = l + 'px';
    overlay.style.top = t + 'px';
    if (chaseCanvas) {
      chaseCanvas.style.width = w + 'px';
      chaseCanvas.style.height = h + 'px';
      chaseCanvas.style.left = l + 'px';
      chaseCanvas.style.top = t + 'px';
    }
  }
  if (img.complete) fitOverlay();
  img.addEventListener('load', fitOverlay);
  window.addEventListener('resize', fitOverlay);
})();

    ctx.beginPath();
    ctx.moveTo(4.3*sc, -21*sc);
    ctx.lineTo(3.5*sc, -19.5*sc);
    ctx.stroke();
    ctx.lineWidth = 1*sc;
    ctx.beginPath();
    ctx.moveTo(4.3*sc, -21.5*sc);
    ctx.lineTo(-4*sc, -22.5*sc);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(-4*sc, -21.5*sc, 1*sc, -Math.PI*0.5, Math.PI*0.5);
    ctx.stroke();

    // Red eye
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 3*sc;
    ctx.beginPath();
    ctx.arc(5.5*sc, -21*sc, 0.7*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Mouth — open jaw with teeth
    ctx.fillStyle = '#8a9a78';
    ctx.beginPath();
    ctx.ellipse(4*sc, -14*sc, 4*sc, 2.5*sc, 0.1, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#1a0000';
    ctx.beginPath();
    ctx.ellipse(5.5*sc, -15.5*sc, 2*sc, 1.5*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ccccaa';
    ctx.fillRect(4*sc, -16.5*sc, 1*sc, 1.8*sc);
    ctx.fillRect(5.3*sc, -16.5*sc, 0.8*sc, 2*sc);
    ctx.fillRect(6.4*sc, -16.2*sc, 0.7*sc, 1.5*sc);
    ctx.fillRect(4.5*sc, -14.5*sc, 0.8*sc, 1.5*sc);
    ctx.fillRect(5.8*sc, -14.5*sc, 0.7*sc, 1.3*sc);

    ctx.restore();
  }

  // Draw spinning file/document
  function drawFile(x, y, t) {
    const sc = getSc();
    ctx.save();
    ctx.translate(x, y);
    const spin = Math.cos(t * 4); // creates a flip effect
    const bobY = Math.sin(t * 3) * 4;
    ctx.translate(0, bobY);
    ctx.scale(spin, 1); // horizontal flip = spinning

    const fs = sc * 0.7;
    // Paper
    ctx.fillStyle = '#f5f0d0';
    ctx.fillRect(-6*fs, -8*fs, 12*fs, 16*fs);
    // Folded corner
    ctx.fillStyle = '#ddd8b0';
    ctx.beginPath();
    ctx.moveTo(6*fs, -8*fs);
    ctx.lineTo(2*fs, -8*fs);
    ctx.lineTo(6*fs, -4*fs);
    ctx.closePath();
    ctx.fill();
    // Text lines
    ctx.fillStyle = '#333';
    for (let i = 0; i < 5; i++) {
      const w = (i === 0 ? 8 : 6 + Math.random() * 3) * fs;
      ctx.fillRect(-4*fs, (-4 + i * 3) * fs, w, 1*fs);
    }
    // "CLASSIFIED" stamp
    ctx.fillStyle = 'rgba(200,0,0,0.6)';
    ctx.font = `bold ${3*fs}px Arial`;
    ctx.textAlign = 'center';
    ctx.save();
    ctx.rotate(-0.3);
    ctx.fillText('SECRET', 0, 2*fs);
    ctx.restore();
    // Gold glow
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7*fs, -9*fs, 14*fs, 18*fs);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  // Collect flash effect
  function drawCollectFlash(x, y, progress) {
    const sc = getSc();
    ctx.save();
    ctx.globalAlpha = 1 - progress;
    const r = progress * 30 * sc;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    // Sparkles
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 + progress * 2;
      const sr = r * 0.8;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(x + Math.cos(a)*sr, y + Math.sin(a)*sr, 2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  let lastTime = 0;
  let chaseAnimId = null;
  function animate(time) {
    time *= 0.001;
    const dt = lastTime ? time - lastTime : 0.016;
    lastTime = time;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const sc = getSc();
    const gap = getGap();
    const cw = getCSSWidth();
    const ch = getCSSHeight();

    // Move in fractional space
    trumpFracX += dir * speedFrac;
    const epsteinFracX = trumpFracX - dir * (gap / cw);

    // Convert fractions to pixels (CSS logical pixels)
    const trumpX = trumpFracX * cw;
    const epsteinX = epsteinFracX * cw;
    const charY = charFracY * ch;

    if (dir === 1 && trumpFracX > 1.12) pickRun();
    else if (dir === -1 && trumpFracX < -0.12) pickRun();

    // File spawning logic
    fileTimer += dt;
    if (!fileActive && !fileCollected && fileTimer > fileCooldown) {
      fileActive = true;
      fileFracX = trumpFracX + dir * (0.1 + Math.random() * 0.08);
      fileFracY = charFracY - 0.12;
    }

    // Trump jump when approaching file
    let jumpOffset = 0;
    if (fileActive && !trumpJumping) {
      const distFrac = Math.abs(trumpFracX - fileFracX);
      if (distFrac < 0.05) {
        trumpJumping = true;
        trumpJumpT = 0;
      }
    }
    if (trumpJumping) {
      trumpJumpT += dt;
      const jumpDuration = 0.5;
      const jumpProgress = trumpJumpT / jumpDuration;
      if (jumpProgress >= 1) {
        trumpJumping = false;
        trumpJumpT = 0;
        if (fileActive) {
          fileActive = false;
          fileCollected = true;
          fileCollectFlash = 0;
        }
      } else {
        jumpOffset = Math.sin(jumpProgress * Math.PI) * 45 * sc;
      }
    }

    // File collect flash
    const fileX = fileFracX * cw;
    const fileY = fileFracY * ch;
    if (fileCollected) {
      fileCollectFlash += dt;
      drawCollectFlash(fileX, fileY, fileCollectFlash / 0.5);
      if (fileCollectFlash > 0.5) {
        fileCollected = false;
        fileTimer = 0;
        fileCooldown = 2.5 + Math.random() * 3;
      }
    }

    if (fileActive) {
      drawFile(fileX, fileY, time);
    }

    drawEpsteinSide(epsteinX, charY, time);
    drawTrumpSide(trumpX, charY, time, jumpOffset);

    chaseAnimId = requestAnimationFrame(animate);
  }
  chaseAnimId = requestAnimationFrame(animate);

  const origStartBtn = document.getElementById('start-btn');
  origStartBtn.addEventListener('click', () => {
    if (chaseAnimId) cancelAnimationFrame(chaseAnimId);
  }, { once: true });

  // Intro music — plays only on start screen
  const introAudio = new Audio('intro.mp3');
  introAudio.loop = true;
  introAudio.volume = 0.5;
  window._introAudio = introAudio;

  // Try autoplay; if blocked, start on first interaction
  introAudio.play().catch(() => {});
  let introUnlocked = false;
  const unlockIntro = (e) => {
    if (introUnlocked) return;
    // Don't restart if user clicked the mute button
    if (e && e.target && e.target.closest('#music-toggle')) return;
    if (musicEnabled && introAudio.paused && !document.getElementById('start-screen').classList.contains('hidden')) {
      introAudio.play().catch(() => {});
    }
    introUnlocked = true;
    document.removeEventListener('click', unlockIntro);
    document.removeEventListener('touchstart', unlockIntro);
    document.removeEventListener('keydown', unlockIntro);
  };
  document.addEventListener('click', unlockIntro);
  document.addEventListener('touchstart', unlockIntro);
  document.addEventListener('keydown', unlockIntro);
})();

// ─────────────────────────────────────────────
// START / RESTART
// ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', function startBtnClick() {
  const btn = this;
  btn.removeEventListener('click', startBtnClick);
  btn.style.pointerEvents = 'none';

  // Button press sound — clean subtle click
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const t = actx.currentTime;
    // Short noise burst filtered to a soft tick
    const bufLen = Math.floor(actx.sampleRate * 0.04);
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufLen * 0.08));
    }
    const src = actx.createBufferSource();
    src.buffer = buf;
    const bpf = actx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = 3200;
    bpf.Q.value = 2.5;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(bpf);
    bpf.connect(gain);
    gain.connect(actx.destination);
    src.start(t);
    src.stop(t + 0.04);
  } catch(e) {}

  // Compress animation
  btn.classList.add('btn-pressed');
  setTimeout(() => {
    btn.classList.remove('btn-pressed');
    btn.classList.add('btn-release');
    setTimeout(() => {
      btn.classList.remove('btn-release');
      // Fade out and stop intro music
      if (window._introAudio) {
        const ia = window._introAudio;
        const fadeOut = setInterval(() => {
          if (ia.volume > 0.05) { ia.volume -= 0.05; }
          else { ia.pause(); ia.currentTime = 0; clearInterval(fadeOut); }
        }, 50);
      }
      initAudio();
      playBgMusic();
      state.running = true;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.getElementById('start-screen').classList.add('hidden');
      }));
    }, 250);
  }, 120);
});

document.getElementById('restart-btn').addEventListener('click', () => {
  initWorld();
  playBgMusic();
  state.running = true;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('game-over-screen').classList.add('hidden');
  }));
});

// ─────────────────────────────────────────────
// ENDSCREEN OVERLAY - track actual image bounds
// ─────────────────────────────────────────────
window.updateEndscreenOverlay = updateEndscreenOverlay;
function updateEndscreenOverlay() {
  const img = document.getElementById('endscreen-img');
  const overlay = document.getElementById('endscreen-overlay');
  const container = document.getElementById('game-over-screen');
  if (!img || !overlay || !container) return;
  // Calculate rendered image bounds with object-fit: contain
  const cw = container.clientWidth, ch = container.clientHeight;
  const iw = img.naturalWidth || 5504, ih = img.naturalHeight || 3072;
  const scale = Math.min(cw / iw, ch / ih);
  const rw = iw * scale, rh = ih * scale;
  const offsetX = (cw - rw) / 2, offsetY = (ch - rh) / 2;
  overlay.style.left = offsetX + 'px';
  overlay.style.top = offsetY + 'px';
  overlay.style.width = rw + 'px';
  overlay.style.height = rh + 'px';
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateEndscreenOverlay();
});

// Boot
initWorld();
update();

// Shine effect is pure CSS now - no JS needed for Run Again highlight
</script>
