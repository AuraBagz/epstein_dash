<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epstein Dash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif;
  -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
  -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
}
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 20px 30px; pointer-events: none; z-index: 10;
}
#score-display {
  color: #fff; font-size: 28px; font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
}
#score-display span { color: #ffd700; }
#distance-display {
  color: #ccc; font-size: 16px; margin-top: 4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
}

#start-screen, #game-over-screen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000; z-index: 20; color: #fff;
}
#start-screen {
  background: #000;
}
#startscreen-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
  z-index: 1;
}
/* Start screen overlay — tracks the image bounds */
#startscreen-overlay {
  position: absolute;
  pointer-events: none;
  z-index: 2;
}
/* Epstein Dash title — animated glow, positioned relative to image */
#epstein-dash-title {
  position: absolute;
  top: 33%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 900;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  white-space: nowrap;
  background: linear-gradient(90deg, #ffd700 0%, #ffcc00 25%, #fff8dc 50%, #ffcc00 75%, #ffd700 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: titleShimmer 4s ease-in-out infinite alternate, titleFloat 3s ease-in-out infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 15px rgba(255,215,0,0.5));
}
@keyframes titleShimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
@keyframes titleFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}
/* START button — positioned inside the ornate frame button area */
#start-btn {
  position: absolute !important;
  bottom: 4.2%;
  left: 50%;
  transform: translateX(-50%) scale(1);
  z-index: 5;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: clamp(24px, 4vw, 52px);
  font-weight: 900;
  letter-spacing: 0.4em;
  color: #ffd700 !important;
  background: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  padding: 1% 5% !important;
  cursor: pointer;
  pointer-events: auto;
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 25px rgba(255,165,0,0.3);
  -webkit-text-fill-color: #ffd700;
  animation: startPulse 2s ease-in-out infinite;
  transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), text-shadow 0.35s ease-in-out, filter 0.35s ease-in-out;
}
#start-btn:hover {
  transform: translateX(-50%) scale(1.08);
  text-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 40px rgba(255,165,0,0.5);
  filter: brightness(1.15);
}
#start-btn.btn-pressed {
  transform: translateX(-50%) scale(0.88) !important;
  filter: brightness(0.85);
  transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), filter 0.1s ease-in-out;
}
#start-btn.btn-release {
  transform: translateX(-50%) scale(1.05) !important;
  filter: brightness(1.1);
  transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.25s ease-in-out;
}
@keyframes startPulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; text-shadow: 0 0 15px rgba(255,215,0,0.8), 0 0 30px rgba(255,165,0,0.4); }
}
/* Chase canvas for start screen — positioned inside overlay */
#start-chase-canvas {
  position: absolute;
  z-index: 1;
  pointer-events: none;
}
/* Controls hint on start screen */
#start-controls-hint {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  font-size: clamp(10px, 1.5vw, 16px);
  color: #888;
  text-align: center;
  white-space: nowrap;
}
#game-over-screen {
  background: #000;
}
#endscreen-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
  animation: endscreenPulse 4s ease-in-out infinite, endscreenGlow 3s ease-in-out infinite alternate;
}
@keyframes endscreenPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.012); }
}
@keyframes endscreenGlow {
  0% { filter: brightness(1) contrast(1); }
  100% { filter: brightness(1.08) contrast(1.05); }
}
#game-over-screen::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
  z-index: 1;
  animation: vignetteFlicker 5s ease-in-out infinite alternate;
}
@keyframes vignetteFlicker {
  0% { opacity: 0.6; }
  50% { opacity: 0.9; }
  100% { opacity: 0.7; }
}
#endscreen-overlay {
  position: absolute;
  pointer-events: none;
  z-index: 2;
}
/* Pointing arrows flanking the website URL */
#website-arrows {
  position: absolute;
  top: 34%;
  left: 50%;
  transform: translateX(-50%);
  width: 78%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
  z-index: 2;
}
#website-arrows .arrow {
  font-size: 4vw;
  color: #ffd700;
  text-shadow: none;
  animation: arrowBounce 1s ease-in-out infinite;
  filter: none;
}
#website-arrows .arrow-left {
  animation-name: arrowBounceLeft;
}
#website-arrows .arrow-right {
  animation-name: arrowBounceRight;
}
@keyframes arrowBounceLeft {
  0%, 100% { transform: translateX(0); opacity: 0.7; }
  50% { transform: translateX(-8px); opacity: 1; }
}
@keyframes arrowBounceRight {
  0%, 100% { transform: translateX(0); opacity: 0.7; }
  50% { transform: translateX(8px); opacity: 1; }
}
#endscreen-website-link {
  display: block;
  font-size: 1px;
  color: transparent;
  text-decoration: none;
  pointer-events: auto;
  cursor: pointer;
  position: absolute;
  top: 30%;
  left: 15%;
  width: 70%;
  height: 12%;
  z-index: 3;
  background: transparent;
  border: none; outline: none;
}
#restart-btn {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  font-size: 1px;
  color: transparent;
  background: transparent;
  border: none; outline: none;
  cursor: pointer;
  pointer-events: auto;
  z-index: 5;
  border-radius: 0;
  padding: 0;
}
#restart-btn:hover, #endscreen-website-link:hover {
  background: transparent !important;
}
#restart-btn:active {
  opacity: 0.7;
}
/* Snake line animation around Run Again */
#restart-snake-border {
  position: absolute;
  bottom: 2.8%;
  left: 37%;
  width: 26%;
  height: 10%;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}
#restart-snake-border::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,215,0,0.0) 20%,
    rgba(255,215,0,0.4) 40%,
    rgba(255,255,255,0.6) 50%,
    rgba(255,215,0,0.4) 60%,
    rgba(255,215,0,0.0) 80%,
    transparent 100%
  );
  animation: shineSwipe 2.5s ease-in-out infinite;
}
@keyframes shineSwipe {
  0%   { left: -100%; }
  100% { left: 200%; }
}
#endscreen-stats {
  display: none;
}
/* Red police siren glow - positioned relative to endscreen-overlay (tracks image) */
#endscreen-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 22% 8%, rgba(255,0,0,0.5) 0%, rgba(255,0,0,0.15) 15%, transparent 35%),
    radial-gradient(circle at 78% 8%, rgba(255,0,0,0.5) 0%, rgba(255,0,0,0.15) 15%, transparent 35%);
  pointer-events: none;
  z-index: 1;
  animation: sirenGlow 1.2s ease-in-out infinite;
}
@keyframes sirenGlow {
  0%   { opacity: 0.2; }
  15%  { opacity: 1; }
  40%  { opacity: 0.1; }
  55%  { opacity: 0.9; }
  75%  { opacity: 0.1; }
  100% { opacity: 0.2; }
}
/* old start-screen h1/p styles removed — replaced by new start screen layout above */
#combo-display {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  z-index: 18; pointer-events: none; text-align: center;
  opacity: 0; transition: opacity 0.15s;
}
#combo-display.active { opacity: 1; }
#combo-count {
  font-size: 96px; font-weight: 900; color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 4px 12px rgba(0,0,0,0.6);
  line-height: 1; transition: transform 0.1s ease-out;
}
#combo-label {
  font-size: 24px; font-weight: 700; color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  letter-spacing: 4px; text-transform: uppercase;
}
#combo-bar-container {
  position: fixed; top: 90px; left: 30px; width: 150px; height: 8px;
  background: rgba(0,0,0,0.4); border-radius: 4px; z-index: 15;
  overflow: hidden; opacity: 0; transition: opacity 0.3s;
}
#combo-bar-container.active { opacity: 1; }
#combo-bar {
  height: 100%; width: 100%; background: linear-gradient(90deg, #ffd700, #ff6b35);
  border-radius: 4px; transition: width 0.1s linear;
}
#music-toggle {
  position: fixed; top: 20px; right: 30px; z-index: 25;
  background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 22px; width: 48px; height: 48px;
  border-radius: 50%; cursor: pointer; backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
#music-toggle:hover { background: rgba(255,255,255,0.2); }
.hidden { display: none !important; }

#mobile-controls {
  position: fixed; bottom: 20px; left: 0; right: 0;
  display: none; justify-content: center; gap: 15px;
  z-index: 15; pointer-events: none;
}
#mobile-controls button {
  width: 70px; height: 70px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 28px; pointer-events: auto;
  backdrop-filter: blur(4px);
}
@media (max-width: 768px) {
  #mobile-controls { display: flex; }
}
</style>
</head>

<script type="module">
import * as THREE from 'three';

// ─────────────────────────────────────────────
// AUDIO SYSTEM
// ─────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let musicEnabled = true;
const bgMusic = new Audio('music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;
const gameOverClips = [new Audio('gameover.mp3'), new Audio('gameover2.mp3')];
gameOverClips.forEach(c => c.volume = 0.7);
const comboClip = new Audio('combo.mp3');
comboClip.volume = 0.8;
const combo40Clip = new Audio('combo40.mp3');
combo40Clip.volume = 0.8;
let combo = 0;
let comboTimer = 0;
const COMBO_TIMEOUT = 2.5; // seconds before combo resets
let combo20Played = false;
let combo40Played = false;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playBgMusic() {
  if (musicEnabled) {
    bgMusic.currentTime = 0;
    bgMusic.play().catch(() => {}); // ignore autoplay block
  }
}

function stopBgMusic() {
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

// High-quality synthesized sound effects using Web Audio API
function playSfx(type) {
  if (!audioCtx || !musicEnabled) return;
  const now = audioCtx.currentTime;

  if (type === 'collect') {
    // Rich document pickup - layered chime with harmonics
    const notes = [1047, 1319, 1568]; // C6, E6, G6 chord arpeggio
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      filter.type = 'highpass';
      filter.frequency.value = 800;
      const t = now + i * 0.04;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.06, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(now);
      osc.stop(t + 0.3);
    });
    // Sparkle noise layer
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    const noise = audioCtx.createBufferSource();
    const nGain = audioCtx.createGain();
    const nFilter = audioCtx.createBiquadFilter();
    noise.buffer = buf;
    noise.connect(nFilter);
    nFilter.connect(nGain);
    nGain.connect(audioCtx.destination);
    nFilter.type = 'bandpass';
    nFilter.frequency.value = 6000;
    nFilter.Q.value = 2;
    nGain.gain.setValueAtTime(0.02, now);
    noise.start(now);

  } else if (type === 'jump') {
    // Punchy spring jump - rising tone with body
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const gain2 = audioCtx.createGain();
    osc.connect(gain);
    osc2.connect(gain2);
    gain.connect(audioCtx.destination);
    gain2.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(550, now + 0.12);
    osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(360, now);
    osc2.frequency.exponentialRampToValueAtTime(1100, now + 0.12);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.start(now);
    osc2.start(now);
    osc.stop(now + 0.25);
    osc2.stop(now + 0.2);

  } else if (type === 'boost') {
    // Power-up surge with rising shimmer
    for (let i = 0; i < 4; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = i % 2 === 0 ? 'sawtooth' : 'sine';
      const baseFreq = 300 + i * 200;
      osc.frequency.setValueAtTime(baseFreq, now);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 3, now + 0.35);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now + i * 0.03);
      osc.stop(now + 0.45);
    }

  } else if (type === 'gameover') {
    // Deep descending doom with rumble
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const gain2 = audioCtx.createGain();
    const dist = audioCtx.createWaveShaperFunction ? null : null;
    osc.connect(gain);
    osc2.connect(gain2);
    gain.connect(audioCtx.destination);
    gain2.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(350, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(120, now);
    osc2.frequency.exponentialRampToValueAtTime(30, now + 1.0);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
    osc.start(now);
    osc2.start(now + 0.1);
    osc.stop(now + 1.0);
    osc2.stop(now + 1.2);

  } else if (type === 'dodge') {
    // Quick lateral swoosh with air noise
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const noise = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    noise.buffer = buf;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.exponentialRampToValueAtTime(800, now + 0.08);
    filter.Q.value = 1;
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    noise.start(now);
  }
}

// Music toggle
const musicToggleBtn = document.getElementById('music-toggle');
musicToggleBtn.addEventListener('click', (e) => {
  e.preventDefault();
  musicEnabled = !musicEnabled;
  musicToggleBtn.innerHTML = musicEnabled ? '&#x1F50A;' : '&#x1F507;';
  if (musicEnabled) {
    if (state && state.running) playBgMusic();
    else if (window._introAudio && !document.getElementById('start-screen').classList.contains('hidden')) {
      window._introAudio.play().catch(() => {});
    }
  } else {
    bgMusic.pause();
    if (window._introAudio) window._introAudio.pause();
  }
  musicToggleBtn.blur(); // prevent spacebar from re-triggering
});
// Prevent spacebar/enter from activating the toggle
musicToggleBtn.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') e.preventDefault();
});

// ─────────────────────────────────────────────
// GAME CONFIG
// ─────────────────────────────────────────────
const LANE_WIDTH = 4;
const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
const ROAD_WIDTH = 16;
const ROAD_SEGMENT_LENGTH = 200;
const SEGMENT_COUNT = 3;
const BASE_SPEED = 30;
const MAX_SPEED = 70;
const SPEED_INCREASE = 0.5; // per second
const JUMP_FORCE = 14;
const GRAVITY = 35;
const OBSTACLE_SPACING = 20;
const DOCUMENT_SPACING = 12;

// ─────────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 250);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 300);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(30, 50, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

// Canvas texture for building signs
function createTextTexture(text, fontSize, color, bgColor, width, height) {
  const canvas = document.createElement('canvas');
  canvas.width = width || 512;
  canvas.height = height || 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor || '#b8860b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = color || '#ffd700';
  ctx.font = `bold ${fontSize || 48}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

// CHARACTER BUILDER

// ==============================================
// ★ TO SWAP THE CHARACTER: Replace this function
//   with your own. Return a THREE.Group positioned
//   at origin, facing -Z, about 2 units tall.
//   Attach an AnimationMixer if you want run anim.
// ==============================================
function createCharacter() {
  const group = new THREE.Group();

  // Presidential suit jacket (dark navy)
  const suitMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3e });
  const bodyGeo = new THREE.BoxGeometry(0.85, 1.2, 0.5);
  const body = new THREE.Mesh(bodyGeo, suitMat);
  body.position.y = 1.4;
  body.castShadow = true;
  group.add(body);

  // White shirt (visible under jacket)
  const shirtMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const shirt = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.9, 0.02), shirtMat);
  shirt.position.set(0, 1.45, 0.26);
  group.add(shirt);

  // Red tie
  const tieMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
  const tie = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.03), tieMat);
  tie.position.set(0, 1.35, 0.28);
  group.add(tie);
  // Tie knot
  const knot = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.1, 0.03), tieMat);
  knot.position.set(0, 1.75, 0.28);
  group.add(knot);

  // Head (fair skin)
  const headMat = new THREE.MeshStandardMaterial({ color: 0xf5c5a3 });
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), headMat);
  head.position.y = 2.3;
  head.castShadow = true;
  group.add(head);

  // Gold/blonde hair - swept back style
  const hairMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.6 });
  // Top hair (swept back, voluminous)
  const hairTop = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.18, 0.55), hairMat);
  hairTop.position.set(0, 2.55, -0.02);
  group.add(hairTop);
  // Side hair
  for (let side of [-1, 1]) {
    const sideHair = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.45), hairMat);
    sideHair.position.set(side * 0.32, 2.4, -0.02);
    group.add(sideHair);
  }
  // Back hair
  const backHair = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.25, 0.1), hairMat);
  backHair.position.set(0, 2.42, -0.28);
  group.add(backHair);
  // Front swoop
  const frontHair = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.15), hairMat);
  frontHair.position.set(0, 2.52, 0.2);
  group.add(frontHair);

  // Suit arms
  for (let side of [-1, 1]) {
    const armGeo = new THREE.BoxGeometry(0.25, 0.8, 0.25);
    const arm = new THREE.Mesh(armGeo, suitMat);
    arm.position.set(side * 0.55, 1.4, 0);
    arm.castShadow = true;
    arm.name = side === -1 ? 'leftArm' : 'rightArm';
    group.add(arm);
    // Hand (skin)
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.2), headMat);
    hand.position.set(side * 0.55, 0.95, 0);
    group.add(hand);
  }

  // Suit pants (slightly lighter)
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a3e });
  for (let side of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), pantsMat);
    leg.position.set(side * 0.22, 0.4, 0);
    leg.castShadow = true;
    leg.name = side === -1 ? 'leftLeg' : 'rightLeg';
    group.add(leg);
  }

  // Black dress shoes
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3 });
  for (let side of [-1, 1]) {
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.15, 0.45), shoeMat);
    shoe.position.set(side * 0.22, 0.05, 0.05);
    group.add(shoe);
  }

  return group;
}

// Simple procedural run animation
function animateCharacter(character, time, isGrounded) {
  const leftArm = character.getObjectByName('leftArm');
  const rightArm = character.getObjectByName('rightArm');
  const leftLeg = character.getObjectByName('leftLeg');
  const rightLeg = character.getObjectByName('rightLeg');
  if (!leftArm) return; // custom character without named parts

  const swing = isGrounded ? Math.sin(time * 12) * 0.6 : 0;
  if (leftArm) leftArm.rotation.x = swing;
  if (rightArm) rightArm.rotation.x = -swing;
  if (leftLeg) leftLeg.rotation.x = -swing;
  if (rightLeg) rightLeg.rotation.x = swing;
}

function createZombie() {
  const group = new THREE.Group();

  // Model faces -Z (toward player, away from camera)

  // Orange prison jumpsuit
  const jumpsuitMat = new THREE.MeshStandardMaterial({ color: 0xff6a00, roughness: 0.8 });
  const jumpsuitDark = new THREE.MeshStandardMaterial({ color: 0xe05500, roughness: 0.8 });
  // Pants same orange

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.2, 0.5), jumpsuitMat);
  body.position.y = 1.4;
  body.castShadow = true;
  group.add(body);

  // Collar — darker orange V-neck collar
  const collarMat = jumpsuitDark;
  for (let side of [-1, 1]) {
    const collar = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.03), collarMat);
    collar.position.set(side * 0.12, 1.95, -0.26);
    collar.rotation.z = side * 0.3;
    group.add(collar);

  epCanvas.width = 512;
  epCanvas.height = 128;
  const epCtx = epCanvas.getContext('2d');
  epCtx.clearRect(0, 0, 512, 128); // fully transparent

  epCtx.font = '900 96px Arial Black, Impact, sans-serif';
  epCtx.textAlign = 'center';
  epCtx.textBaseline = 'middle';
  epCtx.strokeStyle = '#000000';
  epCtx.lineWidth = 4;
  epCtx.strokeText('EPSTEIN', 256, 64);
  epCtx.fillText('EPSTEIN', 256, 64);
  const epsteinTex = new THREE.CanvasTexture(epCanvas);
  const epsteinMat = new THREE.MeshStandardMaterial({ map: epsteinTex, transparent: true, depthWrite: false });
  const epsteinSign = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.25), epsteinMat);
  epsteinSign.position.set(0, 1.6, 0.26);
  group.add(epsteinSign);

  // Jumpsuit zipper line (front -Z)

  const zipper = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.8, 0.02), zipperMat);
  zipper.position.set(0, 1.5, -0.26);
  group.add(zipper);

  // Head - zombified complexion (longer face)
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.33, 16, 16), zombieSkin);
  head.position.y = 2.3;
  head.scale.set(0.9, 1.05, 0.95);
  head.castShadow = true;
  head.name = 'zHead';

  // Prominent nose (front = -Z)
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.1), zombieSkin);
  nose.position.set(0, 2.25, -0.32);
  group.add(nose);

  // Sunken glowing red eyes (front = -Z)
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1.0 });

    const socket = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
    socket.position.set(side * 0.12, 2.35, -0.28);
    group.add(socket);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), eyeMat);
    eye.position.set(side * 0.12, 2.35, -0.31);
    group.add(eye);
  }

  // Glasses — small frames, arms visible from side
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.6 });
  const lensMat = new THREE.MeshStandardMaterial({ color: 0x334455, transparent: true, opacity: 0.25, roughness: 0.1, metalness: 0.5 });
  for (let side of [-1, 1]) {
    // Small lens ring
    const lensRing = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.012, 8, 16), frameMat);
    lensRing.position.set(side * 0.12, 2.35, -0.31);
    group.add(lensRing);
    // Lens glass
    const lens = new THREE.Mesh(new THREE.CircleGeometry(0.045, 12), lensMat);
    lens.position.set(side * 0.12, 2.35, -0.315);
    group.add(lens);
    // Temple arm — sits outside head at x=±0.32
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.018, 0.4), frameMat);
    arm.position.set(side * 0.32, 2.36, -0.05);
    group.add(arm);
    // Ear hook
    const hook = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.04, 0.015), frameMat);
    hook.position.set(side * 0.32, 2.34, 0.14);
    group.add(hook);
  }
  // Bridge
  const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), frameMat);
  bridge.position.set(0, 2.37, -0.32);
  group.add(bridge);

  // White/grey hair — full skull coverage, no bald spot
  const hairWhite = new THREE.MeshStandardMaterial({ color: 0xd8d8d8, roughness: 0.85 });
  const hairLightGrey = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.85 });

  // Blocky volumetric hair — BoxGeometry for chunky look, NO side hair (glasses visible)
  // Top hair — main block sitting on top of head
  const hairTop = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5), hairWhite);
  hairTop.position.set(0, 2.6, 0.02);
  group.add(hairTop);
  // Second layer slightly offset for messy volume
  const hairTop2 = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.12, 0.45), hairLightGrey);
  hairTop2.position.set(0.03, 2.65, -0.02);
  hairTop2.rotation.y = 0.15;
  group.add(hairTop2);
  // Third layer — front fringe hanging over forehead
  const hairFringe = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.1, 0.12), hairWhite);
  hairFringe.position.set(0, 2.56, -0.22);
  hairFringe.rotation.x = 0.2;
  group.add(hairFringe);

  // Back hair blocks — chunky, visible from behind
  const hairBack1 = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.2, 0.15), hairLightGrey);
  hairBack1.position.set(0, 2.5, 0.22);
  group.add(hairBack1);
  const hairBack2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.12), hairWhite);
  hairBack2.position.set(0.04, 2.42, 0.25);
  hairBack2.rotation.y = -0.1;
  group.add(hairBack2);
  // Lower back — nape area
  const hairNape = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.1, 0.1), hairLightGrey);
  hairNape.position.set(0, 2.35, 0.27);
  group.add(hairNape);

  // Grinning mouth (front = -Z)
  const mouthMat = new THREE.MeshStandardMaterial({ color: 0x220000 });
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.05, 0.06), mouthMat);
  mouth.position.set(0, 2.12, -0.3);
  group.add(mouth);
  const teethMat = new THREE.MeshStandardMaterial({ color: 0xccccaa });
  const teeth = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.03, 0.03), teethMat);
  teeth.position.set(0, 2.13, -0.32);
  group.add(teeth);

  // Helper: create a thick oval chain link using TubeGeometry
  function createChainLink(mat) {
    // Oval path — wider and taller for visible interlocking
    const hw = 0.035, hh = 0.055, cr = 0.025;
    const pts = [];
    const s = 6;
    for (let i = 0; i <= s; i++) { const a = -Math.PI/2 + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(hw-cr+cr*Math.cos(a), hh-cr+cr*Math.sin(a), 0)); }
    for (let i = 0; i <= s; i++) { const a = 0 + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(-hw+cr+cr*Math.cos(a), hh-cr+cr*Math.sin(a), 0)); }
    for (let i = 0; i <= s; i++) { const a = Math.PI/2 + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(-hw+cr+cr*Math.cos(a), -hh+cr+cr*Math.sin(a), 0)); }
    for (let i = 0; i <= s; i++) { const a = Math.PI + (Math.PI/2)*(i/s); pts.push(new THREE.Vector3(hw-cr+cr*Math.cos(a), -hh+cr+cr*Math.sin(a), 0)); }
    const curve = new THREE.CatmullRomCurve3(pts, true);
    // Thick tube for chunky metal look
    const geo = new THREE.TubeGeometry(curve, 24, 0.014, 8, true);
    return new THREE.Mesh(geo, mat);
  }

  // Arms — proper parent-child hierarchy so everything moves together
  const zombieHandMat = new THREE.MeshStandardMaterial({ color: 0x7a8070, roughness: 0.9 });
  const cuffMat = new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.9, roughness: 0.15 });
  const chainMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.1 });

  for (let side of [-1, 1]) {
    // ARM PIVOT at shoulder — rotation happens here, everything follows
    const armPivot = new THREE.Group();
    armPivot.position.set(side * 0.55, 1.92, -0.05);
    armPivot.rotation.x = 1.4;
    armPivot.name = side === -1 ? 'zLeftArm' : 'zRightArm';
    group.add(armPivot);

    // Upper arm mesh (hangs down from shoulder in local Y)
    const upperArm = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.55, 0.22), jumpsuitMat);
    upperArm.position.set(0, -0.28, 0);
    upperArm.castShadow = true;
    armPivot.add(upperArm);

    // FOREARM PIVOT at elbow
    const forearmPivot = new THREE.Group();
    forearmPivot.position.set(0, -0.55, 0);
    forearmPivot.rotation.x = 0.3;
    forearmPivot.name = side === -1 ? 'zLeftForearm' : 'zRightForearm';
    armPivot.add(forearmPivot);

    // Forearm mesh — zombie skin
    const forearm = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.45, 0.18), zombieHandMat);
    forearm.position.set(0, -0.22, 0);
    forearmPivot.add(forearm);

    // Handcuff — wraps AROUND the wrist (forearm local Y axis)
    // CylinderGeometry default: wraps around Y axis — perfect for forearm
    const cuffBandGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.06, 12, 1, true);
    const cuffBand = new THREE.Mesh(cuffBandGeo, cuffMat);
    cuffBand.position.set(0, -0.42, 0);
    // NO rotation — default cylinder already wraps around forearm Y axis
    forearmPivot.add(cuffBand);
    // Top/bottom rim rings (TorusGeometry default: lies in XZ plane around Y)
    for (let ry of [-0.03, 0.03]) {
      const rim = new THREE.Mesh(new THREE.TorusGeometry(0.132, 0.01, 8, 14), cuffMat);
      rim.position.set(0, -0.42 + ry, 0);
      // No rotation needed — torus default already encircles Y axis
      forearmPivot.add(rim);
    }
    // Lock box on outer side
    const lockBox = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.07, 0.06), cuffMat);
    lockBox.position.set(side * 0.1, -0.42, 0.08);
    forearmPivot.add(lockBox);
    // Keyhole
    const keyhole = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.02, 6), new THREE.MeshStandardMaterial({ color: 0x222222 }));
    keyhole.position.set(side * 0.1, -0.42, 0.115);
    keyhole.rotation.x = Math.PI / 2;
    forearmPivot.add(keyhole);
    // Wrist marker for chain positioning
    const wristMarker = new THREE.Object3D();
    wristMarker.position.set(0, -0.42, 0);
    wristMarker.name = side === -1 ? 'zLeftWrist' : 'zRightWrist';
    forearmPivot.add(wristMarker);

    // Hand — open grabbing palm
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.15, 0.1), zombieHandMat);
    hand.position.set(0, -0.52, 0);
    hand.name = side === -1 ? 'zLeftHand' : 'zRightHand';
    forearmPivot.add(hand);

    // Clawed fingers — 4 bony fingers
    for (let f = 0; f < 4; f++) {
      const finger = new THREE.Mesh(
        new THREE.BoxGeometry(0.03, 0.14, 0.03),
        zombieHandMat
      );
      finger.position.set((f - 1.5) * 0.04, -0.65, 0);
      finger.rotation.x = -0.2 + (f % 2) * 0.15;
      forearmPivot.add(finger);
    }

    // Thumb
    const thumb = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.09, 0.03), zombieHandMat);
    thumb.position.set(side * 0.09, -0.52, 0.04);
    thumb.rotation.z = side * -0.5;
    forearmPivot.add(thumb);
  }

  // Chain connecting the two handcuffs — interlocking oval links
  const chainGroup = new THREE.Group();
  chainGroup.name = 'zChain';
  const CHAIN_LINK_COUNT = 12; // more links, spaced tight to interlock
  for (let i = 0; i < CHAIN_LINK_COUNT; i++) {
    const link = createChainLink(chainMat);
    chainGroup.add(link);
  }
  group.add(chainGroup);

  // Legs - orange jumpsuit pants
  for (let side of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.28), jumpsuitMat);
    leg.position.set(side * 0.22, 0.4, 0);
    leg.castShadow = true;
    leg.name = side === -1 ? 'zLeftLeg' : 'zRightLeg';
    group.add(leg);
  }

  // Dark dress shoes
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  for (let side of [-1, 1]) {
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.12, 0.38), shoeMat);
    shoe.position.set(side * 0.22, 0.05, -0.03);
    group.add(shoe);
  }

  return group;
}

function animateZombie(zombie, time) {
  const la = zombie.getObjectByName('zLeftArm');
  const ra = zombie.getObjectByName('zRightArm');
  const ll = zombie.getObjectByName('zLeftLeg');
  const rl = zombie.getObjectByName('zRightLeg');
  if (!la) return;

  // Periodic grab lunge — every ~2.5s, one arm does a fast grab
  const grabCycle = time % 2.5;
  const isGrabbing = grabCycle < 0.4;
  const grabSide = Math.floor(time / 2.5) % 2 === 0 ? 1 : -1;
  const grabIntensity = isGrabbing ? Math.sin(grabCycle / 0.4 * Math.PI) : 0;

  // Base shamble sway
  const lurch = Math.sin(time * 8) * 0.3;

  // Arm pivots — rotate from shoulder (base is 1.4 = arms forward toward player)
  let laRot = 1.4 + lurch * 0.35;
  let raRot = 1.4 - lurch * 0.35;
  if (grabSide === -1) laRot += grabIntensity * 0.6;
  else raRot += grabIntensity * 0.6;
  la.rotation.x = laRot;
  ra.rotation.x = raRot;

  // Forearm pivots — child of arm, so rotation is relative
  const lfa = zombie.getObjectByName('zLeftForearm');
  const rfa = zombie.getObjectByName('zRightForearm');
  if (lfa) {
    lfa.rotation.x = 0.3 + Math.sin(time * 10) * 0.2 + (grabSide === -1 ? grabIntensity * 0.5 : 0);
    rfa.rotation.x = 0.3 - Math.sin(time * 10) * 0.2 + (grabSide === 1 ? grabIntensity * 0.5 : 0);
  }

  // Hands — child of forearm, rotation is relative
  const lh = zombie.getObjectByName('zLeftHand');
  const rh = zombie.getObjectByName('zRightHand');
  if (lh) {
    lh.rotation.x = Math.sin(time * 12) * 0.25 + (grabSide === -1 ? grabIntensity * 0.6 : 0);
    rh.rotation.x = -Math.sin(time * 12) * 0.25 + (grabSide === 1 ? grabIntensity * 0.6 : 0);
  }

  // Shambling legs
  ll.rotation.x = -lurch;
  rl.rotation.x = lurch;

  // Head — tracks grab, lurches forward
  const head = zombie.getObjectByName('zHead');
  if (head) {
    head.rotation.z = Math.sin(time * 5) * 0.18 + grabIntensity * grabSide * 0.15;
    head.rotation.x = Math.sin(time * 3) * 0.12 - 0.1 - grabIntensity * 0.2;
  }

  // Update chain between wrists — links tightly spaced and interlocking
  const lw = zombie.getObjectByName('zLeftWrist');
  const rw = zombie.getObjectByName('zRightWrist');
  const chain = zombie.getObjectByName('zChain');
  if (lw && rw && chain) {
    const lwPos = new THREE.Vector3();
    const rwPos = new THREE.Vector3();
    lw.getWorldPosition(lwPos);
    rw.getWorldPosition(rwPos);
    zombie.worldToLocal(lwPos);
    zombie.worldToLocal(rwPos);
    const dir = new THREE.Vector3().subVectors(rwPos, lwPos);
    const dist = dir.length();
    const norm = dir.clone().normalize();
    // Direction angles for orienting links along the chain
    const chainYaw = Math.atan2(norm.x, norm.z);
    const links = chain.children;
    for (let i = 0; i < links.length; i++) {
      const t = links.length > 1 ? i / (links.length - 1) : 0.5;
      // Catenary sag
      const sag = Math.sin(t * Math.PI) * (0.1 + dist * 0.06);
      const px = lwPos.x + dir.x * t;
      const py = lwPos.y + dir.y * t - sag;
      const pz = lwPos.z + dir.z * t;
      links[i].position.set(px, py, pz);
      // Both orientations vertical (visible from camera), 90° apart
      if (i % 2 === 0) {
        links[i].rotation.set(0, chainYaw, 0);
      } else {
        links[i].rotation.set(0, chainYaw + Math.PI / 2, 0);
      }
    }
  }
}

function createRoadSegment(zOffset) {
  const seg = new THREE.Group();

  // Road surface
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEGMENT_LENGTH),
    roadMat
  );
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0.01, -ROAD_SEGMENT_LENGTH / 2);
  road.receiveShadow = true;
  seg.add(road);

  // Sidewalks
  for (let side of [-1, 1]) {
    const sw = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.2, ROAD_SEGMENT_LENGTH),
      sidewalkMat
    );
    sw.position.set(side * (ROAD_WIDTH / 2 + 1.5), 0.1, -ROAD_SEGMENT_LENGTH / 2);
    sw.receiveShadow = true;
    seg.add(sw);
  }

  // Lane divider lines
  for (let i = -1; i <= 1; i += 2) {
    for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 6) {
      const line = new THREE.Mesh(
        new THREE.PlaneGeometry(0.2, 3),
        lineMat
      );
      line.rotation.x = -Math.PI / 2;
      line.position.set(i * LANE_WIDTH / 2 + i * LANE_WIDTH / 2, 0.02, -z);
      seg.add(line);
    }
  }

  seg.position.z = zOffset;
  return seg;
}

function createBuilding(x, z, side) {
  const group = new THREE.Group();

  const width = 4 + Math.random() * 6;
  const height = 10 + Math.random() * 40;
  const depth = 4 + Math.random() * 6;

  const mat = buildingMats[Math.floor(Math.random() * buildingMats.length)];
  const building = new THREE.Mesh(
    new THREE.BoxGeometry(width, height, depth),
    mat
  );
  building.position.set(x + side * (width / 2), height / 2, z);
  building.castShadow = true;
  building.receiveShadow = true;
  group.add(building);

  // Windows
  const floors = Math.floor(height / 3);
  const cols = Math.max(1, Math.floor(width / 2));
  for (let f = 0; f < floors; f++) {
    for (let c = 0; c < cols; c++) {
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(0.8, 1.2),
        windowMat
      );
      const wx = building.position.x - width / 2 + 1 + c * (width / cols);
      const wy = 2 + f * 3;
      win.position.set(wx, wy, building.position.z + depth / 2 + 0.01);
      if (side > 0) {
        win.position.x = building.position.x + width / 2 - 1 - c * (width / cols);
        win.position.z = building.position.z - depth / 2 - 0.01;
        win.rotation.y = Math.PI;
      }
      group.add(win);
    }
  }

  return group;
}

// Progress-aware transition road (0 = full city, 1 = full island)
let transitionProgress = 0;

function createTransitionRoadSegment(zOffset) {
  const t = getTransitionT();
  const seg = new THREE.Group();

  // Blend road color: dark asphalt -> sandy
  const roadColor = new THREE.Color(0x333333).lerp(new THREE.Color(0xd4c4a1), t);
  const transRoadMat = new THREE.MeshStandardMaterial({ color: roadColor, roughness: 0.9 });
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEGMENT_LENGTH),
    transRoadMat
  );
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0.01, -ROAD_SEGMENT_LENGTH / 2);
  road.receiveShadow = true;
  seg.add(road);

  // Lane lines fade out
  const lineOpacity = 1 - t;
  if (lineOpacity > 0.1) {
    const lineColor = new THREE.Color(0xffffff).lerp(new THREE.Color(0xddddbb), t);
    const fadedLineMat = new THREE.MeshStandardMaterial({ color: lineColor, roughness: 0.5, transparent: true, opacity: lineOpacity });
    for (let i = -1; i <= 1; i += 2) {
      for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 6 + t * 4) {
        const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2 * (1 - t * 0.5), 3 * (1 - t * 0.3)), fadedLineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(i * LANE_WIDTH / 2 + i * LANE_WIDTH / 2, 0.02, -z);
        seg.add(line);
      }
    }
  }

  // Sidewalks shrink and fade into sandy shoulders
  if (t < 0.7) {
    const swColor = new THREE.Color(0x999999).lerp(new THREE.Color(0xddc9a0), t / 0.7);
    const swHeight = 0.2 * (1 - t);
    for (let side of [-1, 1]) {
      const sw = new THREE.Mesh(
        new THREE.BoxGeometry(3, Math.max(0.02, swHeight), ROAD_SEGMENT_LENGTH),
        new THREE.MeshStandardMaterial({ color: swColor, roughness: 0.8 })
      );
      sw.position.set(side * (ROAD_WIDTH / 2 + 1.5), swHeight / 2, -ROAD_SEGMENT_LENGTH / 2);
      seg.add(sw);
    }
  }

  // Shoulders transition: near road = sand/beach, far = ocean
  // Near-road sandy shoulder (narrow strip)
  const beachColor = new THREE.Color(0x333333).lerp(new THREE.Color(0xf5deb3), t);
  for (let side of [-1, 1]) {
    const shoulder = new THREE.Mesh(
      new THREE.PlaneGeometry(8, ROAD_SEGMENT_LENGTH),
      new THREE.MeshStandardMaterial({ color: beachColor, roughness: 0.95 })
    );
    shoulder.rotation.x = -Math.PI / 2;
    shoulder.position.set(side * (ROAD_WIDTH / 2 + 4), 0.005, -ROAD_SEGMENT_LENGTH / 2);
    seg.add(shoulder);
  }

  // Water starts appearing at edges (early transition)
  if (t > 0.3) {
    const waterOpacity = Math.min(1, (t - 0.3) / 0.5) * 0.85;
    const transWaterMat = new THREE.MeshStandardMaterial({
      color: 0x006994, roughness: 0.2, metalness: 0.3,
      transparent: true, opacity: waterOpacity
    });
    for (let side of [-1, 1]) {
      const water = new THREE.Mesh(
        new THREE.PlaneGeometry(500, ROAD_SEGMENT_LENGTH + 200),
        transWaterMat
      );
      water.rotation.x = -Math.PI / 2;
      water.position.set(side * (ROAD_WIDTH / 2 + 258), 0.0, -ROAD_SEGMENT_LENGTH / 2);
      seg.add(water);
    }
  }

  seg.position.z = zOffset;
  return seg;
}

function populateTransitionForSegment(segZ) {
  const t = getTransitionT();
  const group = new THREE.Group();
  const baseOffset = ROAD_WIDTH / 2 + 3;

  for (let side of [-1, 1]) {
    const spacing = 8 + t * 6; // buildings get more spaced out
    for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += spacing + Math.random() * 4) {
      const roll = Math.random();

      if (roll > t) {
        // City building - gets shorter as transition progresses
        const b = createBuilding(side * baseOffset, segZ - z, side);
        const maxHeight = 1.0 - t * 0.8; // shrinks toward 20%
        b.scale.y = maxHeight * (0.3 + Math.random() * 0.7);
        group.add(b);
      } else {
        // Palm tree - grows taller as transition progresses
        const palm = createPalmTree(
          side * (baseOffset + Math.random() * 3),
          segZ - z
        );
        const palmScale = 0.3 + t * 0.7;
        palm.scale.setScalar(palmScale * (0.7 + Math.random() * 0.3));
        group.add(palm);
      }
    }

    // Sparse boats start appearing late in transition
    if (t > 0.7) {
      for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 50 + Math.random() * 50) {
        if (Math.random() > 0.5) {
          const boat = createBoat(
            side * (ROAD_WIDTH / 2 + 20 + Math.random() * 20),
            segZ - z
          );
          boat.rotation.y = Math.random() * Math.PI * 2;
          group.add(boat);
        }
      }
    }
  }
  return group;
}

function getTransitionT() {
  // Calculate transition progress based on current distance
  // Segments placed far ahead are at distance + forward offset
  const rawT = Math.max(0, Math.min(1, (state.distance - LEVEL2_DISTANCE) / 500));
  return rawT < 0.5 ? 2 * rawT * rawT : 1 - Math.pow(-2 * rawT + 2, 2) / 2;
}

function createTrumpTower(x, z, side) {
  const group = new THREE.Group();
  const width = 8;
  const height = 50;
  const depth = 8;

  // Gold-tinted glass building
  const goldGlass = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.15, metalness: 0.8 });
  const building = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), goldGlass);
  building.position.set(x + side * (width / 2), height / 2, z);
  building.castShadow = true;
  building.receiveShadow = true;
  group.add(building);

  // Dark window grid
  const darkWindowMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1, metalness: 0.9 });
  const floors = Math.floor(height / 3);
  const cols = 3;
  for (let f = 0; f < floors; f++) {
    for (let c = 0; c < cols; c++) {
      const win = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.8), darkWindowMat);
      const wx = building.position.x - width / 2 + 1.5 + c * 2;
      const wy = 3 + f * 3;
      // Face toward road
      if (side < 0) {
        win.position.set(wx, wy, building.position.z + depth / 2 + 0.01);
      } else {
        win.position.set(building.position.x + width / 2 - 1.5 - c * 2, wy, building.position.z - depth / 2 - 0.01);
        win.rotation.y = Math.PI;
      }
      group.add(win);
    }
  }

  // Large bright 3D block letters "TRUMP TOWER" on the road-facing side
  const goldLetterMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.05, emissive: 0xffd700, emissiveIntensity: 0.4 });
  const roadFaceX = building.position.x - side * (width / 2);
  const letterDepth = 0.6;
  const letterHeight = 2.5;
  const letterWidth = 1.6;

  // "TRUMP" - 5 letters
  const trumpLetters = 'TRUMP';
  const trumpTotalW = trumpLetters.length * letterWidth;
  const trumpStartZ = building.position.z - trumpTotalW / 2 + letterWidth / 2;

  for (let li = 0; li < trumpLetters.length; li++) {
    const charTex = createTextTexture(trumpLetters[li], 200, '#ffffff', '#DAA520', 256, 256);
    const faceMat = new THREE.MeshStandardMaterial({ map: charTex, metalness: 0.8, roughness: 0.1, emissive: 0xffd700, emissiveIntensity: 0.2 });
    const materials = side < 0
      ? [faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat]
      : [goldLetterMat, faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat];
    const letterMesh = new THREE.Mesh(new THREE.BoxGeometry(letterDepth, letterHeight, letterWidth * 0.85), materials);
    const lx = side < 0 ? roadFaceX + letterDepth / 2 + 0.1 : roadFaceX - letterDepth / 2 - 0.1;
    letterMesh.position.set(lx, 10, trumpStartZ + li * letterWidth);
    letterMesh.castShadow = true;
    group.add(letterMesh);
  }

  // "TOWER" - 5 letters below
  const towerLetters = 'TOWER';
  const towerTotalW = towerLetters.length * letterWidth;
  const towerStartZ = building.position.z - towerTotalW / 2 + letterWidth / 2;

  for (let li = 0; li < towerLetters.length; li++) {
    const charTex = createTextTexture(towerLetters[li], 200, '#ffffff', '#DAA520', 256, 256);
    const faceMat = new THREE.MeshStandardMaterial({ map: charTex, metalness: 0.8, roughness: 0.1, emissive: 0xffd700, emissiveIntensity: 0.2 });
    const materials = side < 0
      ? [faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat]
      : [goldLetterMat, faceMat, goldLetterMat, goldLetterMat, goldLetterMat, goldLetterMat];
    const letterMesh = new THREE.Mesh(new THREE.BoxGeometry(letterDepth, letterHeight * 0.85, letterWidth * 0.85), materials);
    const lx = side < 0 ? roadFaceX + letterDepth / 2 + 0.1 : roadFaceX - letterDepth / 2 - 0.1;
    letterMesh.position.set(lx, 7, towerStartZ + li * letterWidth);
    letterMesh.castShadow = true;
    group.add(letterMesh);
  }

  // Gold spire on top
  const spire = new THREE.Mesh(
    new THREE.ConeGeometry(0.5, 6, 8),
    new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 })
  );
  spire.position.set(building.position.x, height + 3, building.position.z);
  group.add(spire);

  return group;
}

function createPalmTree(x, z) {
  const group = new THREE.Group();

  // Trunk (curved slightly)
  const trunkCurve = Math.random() * 0.3 - 0.15;
  for (let i = 0; i < 5; i++) {
    const seg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2 - i * 0.02, 0.25 - i * 0.02, 1.5, 8),
      palmTrunkMat
    );
    seg.position.set(trunkCurve * i, 0.75 + i * 1.4, 0);
    seg.rotation.z = trunkCurve * 0.15;
    group.add(seg);
  }

  // Palm fronds (leaves)
  const topY = 7.5;
  const topX = trunkCurve * 4;
  for (let i = 0; i < 7; i++) {
    const angle = (i / 7) * Math.PI * 2;
    const frond = new THREE.Mesh(
      new THREE.PlaneGeometry(0.8, 3.5),
      palmLeafMat
    );
    frond.position.set(
      topX + Math.cos(angle) * 1.5,
      topY - 0.5,
      Math.sin(angle) * 1.5
    );
    frond.rotation.set(0.8, angle, 0);
    frond.lookAt(topX + Math.cos(angle) * 3, topY - 2, Math.sin(angle) * 3);
    group.add(frond);
  }

  // Coconuts
  const coconutMat = new THREE.MeshStandardMaterial({ color: 0x5C4033 });
  for (let i = 0; i < 3; i++) {
    const coconut = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), coconutMat);
    coconut.position.set(topX + Math.random() * 0.3 - 0.15, topY - 0.3, Math.random() * 0.3 - 0.15);
    group.add(coconut);
  }

  group.position.set(x, 0, z);
  return group;
}

function createStripedBuilding(x, z, side) {
  const group = new THREE.Group();
  const width = 5;
  const height = 8;
  const depth = 5;

  // Build with alternating blue/white stripes
  const stripeCount = 8;
  const stripeH = height / stripeCount;
  for (let i = 0; i < stripeCount; i++) {
    const mat = i % 2 === 0 ? stripeBlueMat : stripeWhiteMat;
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(width + 0.02, stripeH, depth + 0.02), mat);
    stripe.position.set(x + side * (width / 2), stripeH / 2 + i * stripeH, z);
    stripe.castShadow = true;
    group.add(stripe);
  }

  // Front door
  const doorMat = new THREE.MeshStandardMaterial({ color: 0xdedede });
  const door = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 2.5), doorMat);
  if (side < 0) {
    door.position.set(x + side * (width / 2), 1.25, z + depth / 2 + 0.05);
  } else {
    door.position.set(x + side * (width / 2), 1.25, z - depth / 2 - 0.05);
    door.rotation.y = Math.PI;
  }
  group.add(door);

  // Decorative arch on top
  const archMat = new THREE.MeshStandardMaterial({ color: 0xc9a86c });
  const arch = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.5, 0.3), archMat);
  if (side < 0) {
    arch.position.set(x + side * (width / 2), height + 0.5, z + depth / 2 - 0.1);
  } else {
    arch.position.set(x + side * (width / 2), height + 0.5, z - depth / 2 + 0.1);
  }
  group.add(arch);

  return group;
}

function createIslandRoadSegment(zOffset) {

  );

        );

      }
      // Small bushes
      if (Math.random() > 0.6) {

        for (let p = 0; p < puffCount; p++) {
          const puff = new THREE.Mesh(
            new THREE.SphereGeometry(0.25 + Math.random() * 0.3, 6, 5),
            Math.random() > 0.5 ? bushMat : darkBushMat
          );
          puff.position.set(
            (Math.random() - 0.5) * 0.5,
            0.2 + Math.random() * 0.15,
            (Math.random() - 0.5) * 0.4
          );
          puff.scale.y = 0.6 + Math.random() * 0.3;
          bushGroup.add(puff);
        }
        bushGroup.position.set(
          side * (ROAD_WIDTH / 2 + 1 + Math.random() * 2),
          0,
          -z
        );

      }

  // Beach strip next to road

  for (let side of [-1, 1]) {
    const beach = new THREE.Mesh(
      new THREE.PlaneGeometry(beachWidth, ROAD_SEGMENT_LENGTH),

    );

    beach.position.set(side * (ROAD_WIDTH / 2 + beachWidth / 2), 0.005, -ROAD_SEGMENT_LENGTH / 2);
    seg.add(beach);

  // Ocean starts RIGHT at beach outer edge - no overlap with road/beach
  const oceanWidth = 500;

    ocean.position.set(side * (beachOuterEdge + oceanWidth / 2), -0.01, -ROAD_SEGMENT_LENGTH / 2);
    seg.add(ocean);
  }

  seg.position.z = zOffset;
  return seg;
}

function populateIslandForSegment(segZ) {
  const group = new THREE.Group();
  const baseOffset = ROAD_WIDTH / 2 + 2;

  for (let side of [-1, 1]) {
    for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 10 + Math.random() * 8) {

      const palm = createPalmTree(
        side * (baseOffset + Math.random() * 3),

      group.add(palm);
    }

    // Boats in the ocean
    for (let z = 0; z < ROAD_SEGMENT_LENGTH; z += 25 + Math.random() * 30) {
      if (Math.random() > 0.3) {
        const boat = createBoat(
          side * (ROAD_WIDTH / 2 + 15 + Math.random() * 30),
          segZ - z
        );
        boat.rotation.y = Math.random() * Math.PI * 2;

      const b = createStripedBuilding(side * baseOffset, bz, side);
      group.add(b);
    }
  }

  return group;
}

// ─────────────────────────────────────────────
// OBSTACLES (cars, barriers, cones)
// ─────────────────────────────────────────────
function createObstacle(lane, z) {
  const type = Math.floor(Math.random() * 3);
  let mesh;

  if (type === 0) {
    // Realistic car
    const carGroup = new THREE.Group();

    // Pick a realistic car color
    const carColors = [0x1a1a2e, 0xc0c0c0, 0x8b0000, 0x1c3d6e, 0x2d2d2d, 0xf5f5dc, 0x4a0e0e, 0x0a3d0a];
    const carColor = carColors[Math.floor(Math.random() * carColors.length)];
    const carPaint = new THREE.MeshStandardMaterial({ color: carColor, roughness: 0.3, metalness: 0.6 });

    // Main body (lower)
    const bodyLower = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.6, 4.0), carPaint);
    bodyLower.position.y = 0.5;
    bodyLower.castShadow = true;
    carGroup.add(bodyLower);

    // Hood (front slope)
    const hood = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 1.2), carPaint);
    hood.position.set(0, 0.85, -1.2);
    hood.rotation.x = 0.1;
    hood.castShadow = true;
    carGroup.add(hood);

    // Trunk (rear)
    const trunk = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 0.9), carPaint);
    trunk.position.set(0, 0.85, 1.3);
    trunk.rotation.x = -0.08;
    trunk.castShadow = true;
    carGroup.add(trunk);

    // Cabin
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.05, metalness: 0.3, transparent: true, opacity: 0.6 });
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.7, 1.8), glassMat);
    cabin.position.set(0, 1.2, 0);
    cabin.castShadow = true;
    carGroup.add(cabin);

    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.08, 1.8), carPaint);
    roof.position.set(0, 1.56, 0);
    carGroup.add(roof);

    // Windshield (front glass - angled)
    const windshield = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.75), glassMat);
    windshield.position.set(0, 1.2, -0.91);
    windshield.rotation.x = 0.25;
    carGroup.add(windshield);

    // Rear window
    const rearWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.6), glassMat);
    rearWindow.position.set(0, 1.2, 0.91);
    rearWindow.rotation.x = -0.2;
    rearWindow.rotation.y = Math.PI;
    carGroup.add(rearWindow);

    // Headlights
    const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffee, emissive: 0xffffaa, emissiveIntensity: 0.5 });
    for (let side of [-0.7, 0.7]) {
      const hl = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.05), headlightMat);
      hl.position.set(side, 0.6, -2.01);
      carGroup.add(hl);
    }

    // Taillights
    const taillightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.4 });
    for (let side of [-0.7, 0.7]) {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.05), taillightMat);
      tl.position.set(side, 0.6, 2.01);
      carGroup.add(tl);
    }

    // Bumpers
    const bumperMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });
    const frontBumper = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.15), bumperMat);
    frontBumper.position.set(0, 0.3, -2.05);
    carGroup.add(frontBumper);
    const rearBumper = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.15), bumperMat);
    rearBumper.position.set(0, 0.3, 2.05);
    carGroup.add(rearBumper);

    // Grille
    const grilleMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.8 });
    const grille = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.05), grilleMat);
    grille.position.set(0, 0.45, -2.02);
    carGroup.add(grille);

    // Side mirrors
    for (let side of [-1, 1]) {
      const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.2), bumperMat);
      mirror.position.set(side * 1.1, 1.1, -0.3);
      carGroup.add(mirror);
    }

    // Wheels with rims
    const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
    const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.9 });
    for (let wx of [-0.95, 0.95]) {
      for (let wz of [-1.2, 1.2]) {
        // Tire
        const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.25, 16), tireMat);
        tire.rotation.z = Math.PI / 2;
        tire.position.set(wx, 0.32, wz);
        carGroup.add(tire);
        // Rim
        const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.26, 8), rimMat);
        rim.rotation.z = Math.PI / 2;
        rim.position.set(wx, 0.32, wz);
        carGroup.add(rim);
      }
    }

    // Wheel arches (dark indents)
    for (let wx of [-0.85, 0.85]) {
      for (let wz of [-1.2, 1.2]) {
        const arch = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.45, 0.7), bumperMat);
        arch.position.set(wx > 0 ? 1.0 : -1.0, 0.42, wz);
        carGroup.add(arch);
      }
    }

    mesh = carGroup;
    mesh.userData.height = 1.6;
  } else if (type === 1) {
    // Barrier
    const barrier = new THREE.Mesh(
      new THREE.BoxGeometry(3.5, 1.2, 0.5),
      new THREE.MeshStandardMaterial({ color: 0xff8800 })
    );
    barrier.position.y = 0.6;
    barrier.castShadow = true;

    // Stripes
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(3.6, 0.15, 0.52),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    stripe.position.y = 0.8;
    const grp = new THREE.Group();
    grp.add(barrier);
    grp.add(stripe);
    mesh = grp;
    mesh.userData.height = 1.2;
  } else {
    // Traffic cones cluster
    const coneGroup = new THREE.Group();
    for (let i = -1; i <= 1; i++) {
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.25, 0.8, 8),
        new THREE.MeshStandardMaterial({ color: 0xff6600 })
      );
      cone.position.set(i * 0.6, 0.4, 0);
      cone.castShadow = true;
      coneGroup.add(cone);
    }
    mesh = coneGroup;
    mesh.userData.height = 0.8;
  }

  mesh.position.set(LANES[lane], 0, z);
  mesh.userData.lane = lane;
  mesh.userData.isObstacle = true;
  mesh.userData.bbox = new THREE.Box3();
  return mesh;
}

// Island-specific obstacles
function createIslandObstacle(lane, z) {
  const type = Math.floor(Math.random() * 3);
  let mesh;

  if (type === 0) {
    // Boulder / rock cluster
    const rockGroup = new THREE.Group();
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.9 });
    const darkRockMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.95 });

    // Main boulder
    const mainRock = new THREE.Mesh(new THREE.SphereGeometry(0.8, 7, 6), rockMat);
    mainRock.scale.set(1.2, 0.8, 1.0);
    mainRock.position.y = 0.6;
    mainRock.castShadow = true;
    rockGroup.add(mainRock);

    // Smaller rocks around it
    for (let i = 0; i < 3; i++) {
      const smallRock = new THREE.Mesh(
        new THREE.SphereGeometry(0.25 + Math.random() * 0.2, 6, 5),
        Math.random() > 0.5 ? rockMat : darkRockMat
      );
      smallRock.position.set(
        (Math.random() - 0.5) * 1.5,
        0.2,
        (Math.random() - 0.5) * 1.2
      );
      smallRock.scale.y = 0.6 + Math.random() * 0.4;
      smallRock.castShadow = true;
      rockGroup.add(smallRock);
    }
    mesh = rockGroup;
    mesh.userData.height = 1.4;

  } else if (type === 1) {
    // Fallen tree / log
    const logGroup = new THREE.Group();
    const barkMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.9 });
    const innerWoodMat = new THREE.MeshStandardMaterial({ color: 0xC4A46C, roughness: 0.8 });

    // Main log (lying across the road)
    const log = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 3.5, 8), barkMat);
    log.rotation.z = Math.PI / 2;
    log.position.y = 0.4;
    log.castShadow = true;
    logGroup.add(log);

    // Cross-section circle (cut end)
    const endCap = new THREE.Mesh(new THREE.CircleGeometry(0.35, 8), innerWoodMat);
    endCap.position.set(1.76, 0.4, 0);
    endCap.rotation.y = Math.PI / 2;
    logGroup.add(endCap);

    // Some broken branches
    for (let i = 0; i < 2; i++) {
      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.08, 1.2, 6),
        barkMat
      );
      branch.position.set(
        (Math.random() - 0.5) * 2,
        0.6,
        0.3 + i * 0.3
      );
      branch.rotation.set(0.3, Math.random(), 0.8);
      logGroup.add(branch);
    }

    // Leaves scattered
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, side: THREE.DoubleSide });
    for (let i = 0; i < 4; i++) {
      const leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.25), leafMat);
      leaf.position.set(
        (Math.random() - 0.5) * 2.5,
        0.02,
        (Math.random() - 0.5) * 1.5
      );
      leaf.rotation.x = -Math.PI / 2;
      leaf.rotation.z = Math.random() * Math.PI;
      logGroup.add(leaf);
    }
    mesh = logGroup;
    mesh.userData.height = 0.8;

  } else {
    // Rock pile (smaller)
    const pileGroup = new THREE.Group();
    const rockColors = [0x888888, 0x666666, 0x999988, 0x776655];
    for (let i = 0; i < 5; i++) {
      const rock = new THREE.Mesh(
        new THREE.SphereGeometry(0.2 + Math.random() * 0.15, 6, 5),
        new THREE.MeshStandardMaterial({ color: rockColors[Math.floor(Math.random() * rockColors.length)], roughness: 0.9 })
      );
      rock.position.set(
        (Math.random() - 0.5) * 1.5,
        0.15 + Math.random() * 0.1,
        (Math.random() - 0.5) * 1.0
      );
      rock.scale.y = 0.5 + Math.random() * 0.5;
      rock.castShadow = true;
      pileGroup.add(rock);
    }
    mesh = pileGroup;
    mesh.userData.height = 0.5;
  }

  mesh.position.set(LANES[lane], 0, z);
  mesh.userData.lane = lane;
  mesh.userData.isObstacle = true;
  mesh.userData.bbox = new THREE.Box3();
  return mesh;
}

// ─────────────────────────────────────────────
// PAPER DOCUMENTS (Collectibles)
// ─────────────────────────────────────────────
function createDocument(lane, z) {
  const group = new THREE.Group();

  // Paper sheet
  const paper = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 1.1),
    documentMat
  );
  paper.castShadow = true;
  group.add(paper);

  // Text lines on paper
  const linesMat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
  for (let i = 0; i < 5; i++) {
    const textLine = new THREE.Mesh(
      new THREE.PlaneGeometry(0.5 + Math.random() * 0.2, 0.03),
      linesMat
    );
    textLine.position.set(0, 0.3 - i * 0.15, 0.01);
    group.add(textLine);
  }

  // Corner fold
  const foldGeo = new THREE.BufferGeometry();
  const foldVerts = new Float32Array([
    0.4, 0.55, 0,
    0.4, 0.35, 0,
    0.2, 0.55, 0,
  ]);
  foldGeo.setAttribute('position', new THREE.BufferAttribute(foldVerts, 3));
  foldGeo.computeVertexNormals();
  const fold = new THREE.Mesh(foldGeo, new THREE.MeshStandardMaterial({
    color: 0xeeeecc, side: THREE.DoubleSide
  }));
  group.add(fold);

  // Glow ring
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.7, 0.85, 16),
    new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
  );
  group.add(ring);

  group.position.set(LANES[lane], 1.5, z);
  group.userData.isDocument = true;
  group.userData.lane = lane;
  group.userData.collected = false;
  return group;
}

// CITY PROPS (streetlights, etc.)
// ─────────────────────────────────────────────
function createStreetlight(x, z) {
  const group = new THREE.Group();
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 5, 8), poleMat);
  pole.position.y = 2.5;
  group.add(pole);

  const arm = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 0.08), poleMat);
  arm.position.set(x > 0 ? -0.75 : 0.75, 5, 0);
  group.add(arm);

  const lampMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffff88, emissiveIntensity: 0.5 });
  const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), lampMat);
  lamp.position.set(x > 0 ? -1.5 : 1.5, 4.95, 0);
  group.add(lamp);

  group.position.set(x, 0, z);
  return group;
}
