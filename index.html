// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
const clock = new THREE.Clock();

let renderStopped = false;
function update() {
  requestAnimationFrame(update);

  // Don't touch the renderer at all when canvas is hidden
  if (renderStopped) return;

  const dt = Math.min(clock.getDelta(), 0.05);

  if (!state.running) {
    // Skip rendering when an overlay is visible
    if (renderer.domElement.style.display === 'none') return;

    // Idle animation for menu
    if (player) {
      player.rotation.y = Math.PI + Math.sin(Date.now() * 0.001) * 0.2;
    }
    if (zombie) {
      zombie.position.z = ZOMBIE_START_Z;
      animateZombie(zombie, Date.now() * 0.001);
    }
    renderer.render(scene, camera);
    return;
  }

  state.gameTime += dt;

  // Speed increase
  state.speed = Math.min(MAX_SPEED, BASE_SPEED + state.gameTime * SPEED_INCREASE);

  // Boost from collecting documents
  let boostMultiplier = 1;
  if (state.boostTimer > 0) {
    state.boostTimer -= dt;
    boostMultiplier = 1.6; // 60% speed boost
    // Also slow zombie approach during boost
    zombieZ += 0.5 * dt;
  }

  // Combo speed boost (stacks with document boost)
  updateCombo(dt);
  if (combo >= 2) {
    const comboBoost = 1 + Math.min(combo * 0.03, 0.6); // up to 60% extra at 20+ combo
    boostMultiplier *= comboBoost;
    // Combo also pushes zombie back slightly
    if (combo >= 5) zombieZ += 0.2 * dt;
  }

  // Move world toward player (player stays near z=0)
  const moveZ = state.speed * boostMultiplier * dt;
  state.distance += moveZ;

  // Island environment is constant - no transition needed

  // Move all world objects
  for (const seg of roadSegments) seg.position.z += moveZ;
  for (const bg of buildingGroups) bg.position.z += moveZ;
  for (const obs of obstacles) obs.position.z += moveZ;
  for (const doc of documents) {
    doc.position.z += moveZ;
    // Float and spin animation
    if (!doc.userData.collected) {
      doc.rotation.y += dt * 2;
      doc.position.y = 1.5 + Math.sin(state.gameTime * 3 + doc.position.x) * 0.3;
    }
  }
  for (const sl of streetlights) sl.position.z += moveZ;
  ground.position.z = player.position.z;

  // Sun tracks player (stays in the distance)
  sun.position.z = player.position.z - 200;
  sunGlow.position.z = sun.position.z;
  sunHalo.position.z = sun.position.z;
  sunHalo.lookAt(camera.position);

  // Animate clouds - slow drift + track player
  for (const c of clouds) {
    c.position.x += c.userData.speed * dt;
    c.position.z += moveZ * 0.3; // parallax - clouds move slower
    // Wrap clouds that drift too far
    if (c.position.x > 250) c.position.x = -250;
  }

  // Lane movement
  player.position.x += (state.targetX - player.position.x) * 10 * dt;

  // Jump / gravity
  if (!state.isGrounded) {
    state.velocityY -= GRAVITY * dt;
    state.playerY += state.velocityY * dt;
    if (state.playerY <= 0) {
      state.playerY = 0;
      state.velocityY = 0;
      state.isGrounded = true;
    }
  }
  player.position.y = state.playerY;

  // Character animation
  animateCharacter(player, state.gameTime, state.isGrounded);

  // Slight forward lean when running
  player.rotation.x = state.isGrounded ? -0.05 : (state.velocityY > 0 ? -0.15 : 0.1);

  // Zombie chaser - slowly closes in over time
  const zombieGainRate = 0.08 + state.gameTime * 0.008; // slow start, gradually faster
  zombieZ -= zombieGainRate * dt;
  // Zombie follows player's lane with a delay
  zombie.position.x += (player.position.x - zombie.position.x) * 2 * dt;
  zombie.position.z = zombieZ;
  zombie.position.y = Math.abs(Math.sin(state.gameTime * 8)) * 0.15; // slight bounce
  // zombie faces away from camera (chasing player)
  animateZombie(zombie, state.gameTime);

  // Zombie catches player
  if (zombieZ <= ZOMBIE_CLOSE_Z) {
    gameOver();
    return;
  }

  // Camera follow - positioned to see both player and zombie behind
  camera.position.x += (player.position.x * 0.5 - camera.position.x) * 3 * dt;
  camera.position.y = 7 + state.playerY * 0.3;
  camera.position.z = 12;
  camera.lookAt(player.position.x * 0.3, 1.5, -8);
  dirLight.position.x = player.position.x + 30;

  // Spawning
  spawnObstacles(-state.distance - 50);
  spawnDocuments(-state.distance - 30);

  // Collision detection
  if (checkCollisions()) {
    gameOver();
    return;
  }
  checkDocumentPickup();

  // Cleanup
  cleanupBehindPlayer(0);

  updateHUD();
  renderer.render(scene, camera);
}

// ─────────────────────────────────────────────
// START SCREEN OVERLAY SIZING (track image bounds)
// ─────────────────────────────────────────────
(function sizeStartOverlay() {
  const img = document.getElementById('startscreen-img');
  const overlay = document.getElementById('startscreen-overlay');
  const chaseCanvas = document.getElementById('start-chase-canvas');
  if (!img || !overlay) return;

  function fitOverlay() {
    const cw = img.parentElement.clientWidth;
    const ch = img.parentElement.clientHeight;
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const containerRatio = cw / ch;
    let w, h, l, t;
    if (containerRatio > imgRatio) {
      h = ch;
      w = ch * imgRatio;
      l = (cw - w) / 2;
      t = 0;
    } else {
      w = cw;
      h = cw / imgRatio;
      l = 0;
      t = (ch - h) / 2;
    }
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    overlay.style.left = l + 'px';
    overlay.style.top = t + 'px';
    if (chaseCanvas) {
      chaseCanvas.style.width = w + 'px';
      chaseCanvas.style.height = h + 'px';
      chaseCanvas.style.left = l + 'px';
      chaseCanvas.style.top = t + 'px';
    }
    // Scale font sizes to rendered image width, capped to prevent overflow
    const title = document.getElementById('epstein-dash-title');
    const btn = document.getElementById('start-btn');
    const hint = document.getElementById('start-controls-hint');
    if (title) {
      // "EPSTEIN DASH" = 12 chars + 11 gaps of letter-spacing (0.3em)
      // Approximate rendered width ≈ fontSize * (12 * 0.6 + 11 * 0.3) = fontSize * 10.5
      // Fit within 80% of overlay width
      const maxFs = (w * 0.60) / 10.5;
      title.style.fontSize = Math.min(maxFs, 90) + 'px';
    }
    if (btn) {
      const fs = Math.min(w * 0.035, h * 0.06, 64);
      btn.style.fontSize = fs + 'px';
      // Pin the text CENTER at a fixed % from the bottom of the overlay
      // so it stays locked inside the ornate button outline at every size
      btn.style.bottom = (h * 0.088 - fs / 2) + 'px';
    }
    if (hint) hint.style.fontSize = Math.min(w * 0.016, 18) + 'px';
  }
  if (img.complete) fitOverlay();
  img.addEventListener('load', fitOverlay);
  window.addEventListener('resize', fitOverlay);
})();

// ─────────────────────────────────────────────
// START SCREEN CHASE ANIMATION (Canvas) — Side view
// ─────────────────────────────────────────────
(function startChaseAnimation() {
  const canvas = document.getElementById('start-chase-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    const rect = canvas.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  // Resize on image load, DOM ready, and window resize
  const startImg = document.getElementById('startscreen-img');
  if (startImg) {
    if (startImg.complete) { resize(); }
    startImg.addEventListener('load', resize);
  }
  setTimeout(resize, 50);
  setTimeout(resize, 200);
  window.addEventListener('resize', resize);

  // State: positions stored as fractions (0-1) of canvas size
  let dir = 1;
  let trumpFracX = -0.1; // fraction of canvas width
  let charFracY = 0.5;   // fraction of canvas height
  let speedFrac = 0.004;  // fraction of canvas width per frame
  // sc and gap computed dynamically from CSS (logical) canvas size
  function getCSSWidth() { return canvas.width / (window.devicePixelRatio || 1); }
  function getCSSHeight() { return canvas.height / (window.devicePixelRatio || 1); }
  function getSc() { return Math.min(Math.min(getCSSWidth(), getCSSHeight()) * 0.004, 2.2); }
  function getGap() { return getSc() * 48; }

  // File collectible state
  let fileFracX = -1, fileFracY = 0, fileActive = false;
  let fileTimer = 0, fileCooldown = 3 + Math.random() * 3;
  let trumpJumping = false, trumpJumpT = 0;
  let fileCollected = false, fileCollectFlash = 0;

  function pickRun() {
    dir = Math.random() > 0.5 ? 1 : -1;
    speedFrac = 0.003 + Math.random() * 0.002;
    charFracY = 0.45 + Math.random() * 0.35;
    trumpFracX = dir === 1 ? -0.1 : 1.1;
  }
  pickRun();

  // SIDE-VIEW Trump (running right = facing right)
  function drawTrumpSide(x, y, t, jumpOffset) {
    const sc = getSc();
    ctx.save();
    ctx.translate(x, y - (jumpOffset || 0));
    if (dir < 0) ctx.scale(-1, 1);
    const legA = Math.sin(t * 14) * 0.55;
    const armA = Math.sin(t * 14 + Math.PI) * 0.5;
    const bounce = Math.abs(Math.sin(t * 14)) * 2;

    ctx.translate(0, -bounce);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 30*sc + bounce, 10*sc, 3*sc, 0, 0, Math.PI*2);
    ctx.fill();

    // 1) Back arm (behind body)
    ctx.save();
    ctx.translate(-3*sc, -7*sc);
    ctx.rotate(-armA);
    ctx.fillStyle = '#151530';
    ctx.fillRect(-2*sc, 0, 4*sc, 14*sc);
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath();
    ctx.arc(0, 15*sc, 2.5*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 2) Back leg (behind body) — thicker
    ctx.save();
    ctx.translate(0, 10*sc);
    ctx.rotate(-legA);
    ctx.fillStyle = '#151530';
    ctx.fillRect(-3.5*sc, 0, 7*sc, 18*sc);
    ctx.fillStyle = '#111';
    ctx.fillRect(-1.5*sc, 16*sc, 7*sc, 3*sc);
    ctx.restore();

    // 3) Torso — side view (stocky)
    ctx.fillStyle = '#1a1a3e';
    ctx.fillRect(-7*sc, -10*sc, 14*sc, 22*sc);
    // Belly bulge front
    ctx.beginPath();
    ctx.ellipse(4*sc, 2*sc, 5*sc, 12*sc, 0, -Math.PI*0.5, Math.PI*0.5);
    ctx.fill();
    // White shirt line (visible on front)
    ctx.fillStyle = '#eee';
    ctx.fillRect(5*sc, -9*sc, 3*sc, 18*sc);
    // Red tie (centered on shirt)
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(6*sc, -7*sc, 2*sc, 16*sc);
    // Tie knot
    ctx.beginPath();
    ctx.moveTo(5.5*sc, -7*sc);
    ctx.lineTo(8.5*sc, -7*sc);
    ctx.lineTo(7*sc, -5.5*sc);
    ctx.closePath();
    ctx.fill();

    // 4) Front leg — thicker
    ctx.save();
    ctx.translate(0, 10*sc);
    ctx.rotate(legA);
    ctx.fillStyle = '#1a1a3e';
    ctx.fillRect(-3.5*sc, 0, 7*sc, 18*sc);
    ctx.fillStyle = '#111';
    ctx.fillRect(-1.5*sc, 16*sc, 7*sc, 3*sc);
    ctx.restore();

    // 5) Front arm (in front of body)
    ctx.save();
    ctx.translate(3*sc, -7*sc);
    ctx.rotate(armA);
    ctx.fillStyle = '#1a1a3e';
    ctx.fillRect(-2*sc, 0, 4*sc, 14*sc);
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath();
    ctx.arc(0, 15*sc, 2.5*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Neck
    ctx.fillStyle = '#f5d0a9';
    ctx.fillRect(-2.5*sc, -14*sc, 5*sc, 5*sc);

    // Head — side profile
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath();
    ctx.ellipse(1*sc, -20*sc, 7*sc, 8*sc, 0, 0, Math.PI*2);
    ctx.fill();

    // Nose — small side-profile triangle
    ctx.fillStyle = '#e8c098';
    ctx.beginPath();
    ctx.moveTo(7*sc, -20.5*sc);
    ctx.lineTo(9.5*sc, -19*sc);
    ctx.lineTo(7*sc, -18*sc);
    ctx.closePath();
    ctx.fill();

    // Golden hair
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(0, -26*sc, 7*sc, 5*sc, -0.15, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-3*sc, -24*sc, 5*sc, 4*sc, 0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(5*sc, -25*sc, 4*sc, 3*sc, -0.3, 0, Math.PI*2);
    ctx.fill();

    // Eye — wide/scared
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(5*sc, -21*sc, 2*sc, 2.2*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#4488cc';
    ctx.beginPath();
    ctx.arc(5.5*sc, -21*sc, 1.2*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(5.8*sc, -21*sc, 0.5*sc, 0, Math.PI*2);
    ctx.fill();

    // Eyebrow — raised/worried
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 1.2*sc;
    ctx.beginPath();
    ctx.moveTo(3.5*sc, -24*sc);
    ctx.quadraticCurveTo(5*sc, -25.5*sc, 7*sc, -24*sc);
    ctx.stroke();

    // Mouth — small worried "o" shape
    ctx.fillStyle = '#1a0000';
    ctx.beginPath();
    ctx.ellipse(6.5*sc, -15.5*sc, 1.2*sc, 0.9*sc, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  // SIDE-VIEW Epstein zombie (arms outstretched forward)
  function drawEpsteinSide(x, y, t) {
    const sc = getSc();
    ctx.save();
    ctx.translate(x, y);
    if (dir < 0) ctx.scale(-1, 1);
    const legA = Math.sin(t * 14) * 0.4;
    const bounce = Math.abs(Math.sin(t * 14)) * 1.5;
    const grabPulse = Math.sin(t * 6) * 0.15;

    ctx.translate(0, -bounce);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 30*sc + bounce, 10*sc, 3*sc, 0, 0, Math.PI*2);
    ctx.fill();

    // 1) Back arm (behind body) — outstretched
    ctx.save();
    ctx.translate(2*sc, -5*sc);
    ctx.rotate(-1.4 + grabPulse);
    ctx.fillStyle = '#e05500';
    ctx.fillRect(-2*sc, 0, 4*sc, 10*sc);
    ctx.fillStyle = '#8a9a78';
    ctx.fillRect(-1.8*sc, 10*sc, 3.5*sc, 10*sc);
    ctx.fillStyle = '#7a8070';
    ctx.beginPath();
    ctx.arc(0, 21*sc, 2.5*sc, 0, Math.PI*2);
    ctx.fill();
    for (let f = 0; f < 4; f++) {
      ctx.save();
      ctx.translate((f-1.5)*1.5*sc, 23*sc);
      ctx.rotate(-0.2 + f*0.12);
      ctx.fillRect(-0.5*sc, 0, 1*sc, 3.5*sc);
      ctx.restore();
    }
    ctx.restore();

    // 2) Back leg
    ctx.save();
    ctx.translate(0, 10*sc);
    ctx.rotate(-legA);
    ctx.fillStyle = '#e05500';
    ctx.fillRect(-2.5*sc, 0, 5*sc, 18*sc);
    ctx.fillStyle = '#333';
    ctx.fillRect(-1*sc, 16*sc, 6*sc, 3*sc);
    ctx.restore();

    // 3) Torso — orange jumpsuit
    ctx.fillStyle = '#ff6a00';
    ctx.fillRect(-5*sc, -10*sc, 10*sc, 22*sc);

    // 4) Front leg
    ctx.save();
    ctx.translate(0, 10*sc);
    ctx.rotate(legA);
    ctx.fillStyle = '#ff6a00';
    ctx.fillRect(-2.5*sc, 0, 5*sc, 18*sc);
    ctx.fillStyle = '#333';
    ctx.fillRect(-1*sc, 16*sc, 6*sc, 3*sc);
    ctx.restore();

    // 5) Front arm (in front of body) — outstretched
    ctx.save();
    ctx.translate(4*sc, -6*sc);
    ctx.rotate(-1.5 - grabPulse);
    ctx.fillStyle = '#ff6a00';
    ctx.fillRect(-2*sc, 0, 4*sc, 10*sc);
    ctx.fillStyle = '#8a9a78';
    ctx.fillRect(-1.8*sc, 10*sc, 3.5*sc, 10*sc);
    ctx.fillStyle = '#7a8070';
    ctx.beginPath();
    ctx.arc(0, 21*sc, 2.5*sc, 0, Math.PI*2);
    ctx.fill();
    for (let f = 0; f < 4; f++) {
      ctx.save();
      ctx.translate((f-1.5)*1.5*sc, 23*sc);
      ctx.rotate(-0.2 + f*0.12);
      ctx.fillRect(-0.5*sc, 0, 1*sc, 3.5*sc);
      ctx.restore();
    }
    ctx.restore();

    // Neck
    ctx.fillStyle = '#8a9a78';
    ctx.fillRect(-2*sc, -14*sc, 4*sc, 5*sc);

    // Head — side profile zombie
    ctx.fillStyle = '#8a9a78';
    ctx.beginPath();
    ctx.ellipse(1*sc, -20*sc, 7*sc, 8*sc, 0, 0, Math.PI*2);
    ctx.fill();

    // Nose — zombie side profile
    ctx.fillStyle = '#7a8a68';
    ctx.beginPath();
    ctx.ellipse(8*sc, -18*sc, 1.6*sc, 1.1*sc, 0.3, 0, Math.PI*2);
    ctx.fill();

    // White hair — blocky side profile
    ctx.fillStyle = '#d8d8d8';
    ctx.save();
    ctx.translate(-1*sc, -26*sc);
    ctx.rotate(0.05);
    ctx.fillRect(-5*sc, -3*sc, 10*sc, 7*sc);
    ctx.restore();
    ctx.fillStyle = '#c8c8c8';
    ctx.save();
    ctx.translate(-4*sc, -24*sc);
    ctx.rotate(0.15);
    ctx.fillRect(-2.5*sc, -2*sc, 5*sc, 6*sc);
    ctx.restore();
    ctx.fillStyle = '#b8b8b8';
    ctx.save();
    ctx.translate(3*sc, -27*sc);
    ctx.rotate(-0.1);
    ctx.fillRect(-3*sc, -1.5*sc, 6*sc, 4*sc);
    ctx.restore();

    // Glasses — side view
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.3*sc;
    ctx.beginPath();
    ctx.ellipse(5.5*sc, -21*sc, 1.2*sc, 2.2*sc, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4.3*sc, -21*sc);
    ctx.lineTo(3.5*sc, -19.5*sc);
    ctx.stroke();
    ctx.lineWidth = 1*sc;
    ctx.beginPath();
    ctx.moveTo(4.3*sc, -21.5*sc);
    ctx.lineTo(-4*sc, -22.5*sc);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(-4*sc, -21.5*sc, 1*sc, -Math.PI*0.5, Math.PI*0.5);
    ctx.stroke();

    // Red eye
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 3*sc;
    ctx.beginPath();
    ctx.arc(5.5*sc, -21*sc, 0.7*sc, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Mouth — open jaw with teeth
    ctx.fillStyle = '#8a9a78';
    ctx.beginPath();
    ctx.ellipse(4*sc, -14*sc, 4*sc, 2.5*sc, 0.1, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#1a0000';
    ctx.beginPath();
    ctx.ellipse(5.5*sc, -15.5*sc, 2*sc, 1.5*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ccccaa';
    ctx.fillRect(4*sc, -16.5*sc, 1*sc, 1.8*sc);
    ctx.fillRect(5.3*sc, -16.5*sc, 0.8*sc, 2*sc);
    ctx.fillRect(6.4*sc, -16.2*sc, 0.7*sc, 1.5*sc);
    ctx.fillRect(4.5*sc, -14.5*sc, 0.8*sc, 1.5*sc);
    ctx.fillRect(5.8*sc, -14.5*sc, 0.7*sc, 1.3*sc);

    ctx.restore();
  }

  // Draw spinning file/document
  function drawFile(x, y, t) {
    const sc = getSc();
    ctx.save();
    ctx.translate(x, y);
    const spin = Math.cos(t * 4); // creates a flip effect
    const bobY = Math.sin(t * 3) * 4;
    ctx.translate(0, bobY);
    ctx.scale(spin, 1); // horizontal flip = spinning

    const fs = sc * 0.7;
    // Paper
    ctx.fillStyle = '#f5f0d0';
    ctx.fillRect(-6*fs, -8*fs, 12*fs, 16*fs);
    // Folded corner
    ctx.fillStyle = '#ddd8b0';
    ctx.beginPath();
    ctx.moveTo(6*fs, -8*fs);
    ctx.lineTo(2*fs, -8*fs);
    ctx.lineTo(6*fs, -4*fs);
    ctx.closePath();
    ctx.fill();
    // Text lines
    ctx.fillStyle = '#333';
    for (let i = 0; i < 5; i++) {
      const w = (i === 0 ? 8 : 6 + Math.random() * 3) * fs;
      ctx.fillRect(-4*fs, (-4 + i * 3) * fs, w, 1*fs);
    }
    // "CLASSIFIED" stamp
    ctx.fillStyle = 'rgba(200,0,0,0.6)';
    ctx.font = `bold ${3*fs}px Arial`;
    ctx.textAlign = 'center';
    ctx.save();
    ctx.rotate(-0.3);
    ctx.fillText('SECRET', 0, 2*fs);
    ctx.restore();
    // Gold glow
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7*fs, -9*fs, 14*fs, 18*fs);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  // Collect sparkle effect — star bursts that fly outward and fade
  function drawCollectFlash(x, y, progress) {
    const sc = getSc();
    ctx.save();

    // 4-point star sparkle shape
    function drawStar(cx, cy, size, rot) {
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a = rot + i * Math.PI / 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * size, cy + Math.sin(a) * size);
      }
      ctx.stroke();
    }

    const alpha = 1 - progress * progress; // ease out
    const spread = progress * 40 * sc;

    // Central flash — bright white burst that shrinks
    if (progress < 0.3) {
      const flashAlpha = 1 - progress / 0.3;
      const flashR = (1 - progress / 0.3) * 8 * sc;
      ctx.globalAlpha = flashAlpha * 0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, flashR, 0, Math.PI * 2);
      ctx.fill();
    }

    // 8 sparkle stars bursting outward
    const sparkleCount = 8;
    for (let i = 0; i < sparkleCount; i++) {
      const baseAngle = i * (Math.PI * 2 / sparkleCount);
      const angle = baseAngle + progress * 0.5; // slight rotation as they fly
      const dist = spread * (0.6 + (i % 3) * 0.2); // varied distances
      const sx = x + Math.cos(angle) * dist;
      const sy = y + Math.sin(angle) * dist;
      const starSize = sc * (3 + (i % 2) * 2) * (1 - progress * 0.6);

      ctx.globalAlpha = alpha * (0.6 + (i % 2) * 0.4);
      ctx.strokeStyle = i % 3 === 0 ? '#fff' : (i % 3 === 1 ? '#ffd700' : '#ffaa00');
      ctx.lineWidth = sc * (i % 2 === 0 ? 1.5 : 1);
      drawStar(sx, sy, starSize, baseAngle + progress * 3);
    }

    // Tiny gold dots trailing outward
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 + progress * 1.5;
      const d = spread * 0.5 * (1 + i * 0.1);
      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(x + Math.cos(a) * d, y + Math.sin(a) * d, sc * 1.2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  let lastTime = 0;
  let chaseAnimId = null;
  function animate(time) {
    time *= 0.001;
    const dt = lastTime ? time - lastTime : 0.016;
    lastTime = time;
    // Clear using CSS logical dimensions (transform handles DPR scaling)
    const cw = getCSSWidth();
    const ch = getCSSHeight();
    ctx.clearRect(0, 0, cw, ch);

    const sc = getSc();
    const gap = getGap();

    // Move in fractional space
    trumpFracX += dir * speedFrac;
    const epsteinFracX = trumpFracX - dir * (gap / cw);

    // Convert fractions to pixels (CSS logical pixels)
    const trumpX = trumpFracX * cw;
    const epsteinX = epsteinFracX * cw;
    const charY = charFracY * ch;

    if (dir === 1 && trumpFracX > 1.12) pickRun();
    else if (dir === -1 && trumpFracX < -0.12) pickRun();

    // File spawning logic
    fileTimer += dt;
    if (!fileActive && !fileCollected && fileTimer > fileCooldown) {
      fileActive = true;
      fileFracX = trumpFracX + dir * (0.1 + Math.random() * 0.08);
      fileFracY = charFracY - 0.12;
    }

    // Trump jump when approaching file
    let jumpOffset = 0;
    if (fileActive && !trumpJumping) {
      const distFrac = Math.abs(trumpFracX - fileFracX);
      if (distFrac < 0.05) {
        trumpJumping = true;
        trumpJumpT = 0;
      }
    }
    if (trumpJumping) {
      trumpJumpT += dt;
      const jumpDuration = 0.5;
      const jumpProgress = trumpJumpT / jumpDuration;
      if (jumpProgress >= 1) {
        trumpJumping = false;
        trumpJumpT = 0;
        if (fileActive) {
          fileActive = false;
          fileCollected = true;
          fileCollectFlash = 0;
        }
      } else {
        jumpOffset = Math.sin(jumpProgress * Math.PI) * 45 * sc;
      }
    }

    // File collect flash
    const fileX = fileFracX * cw;
    const fileY = fileFracY * ch;
    if (fileCollected) {
      fileCollectFlash += dt;
      drawCollectFlash(fileX, fileY, fileCollectFlash / 0.5);
      if (fileCollectFlash > 0.5) {
        fileCollected = false;
        fileTimer = 0;
        fileCooldown = 2.5 + Math.random() * 3;
      }
    }

    if (fileActive) {
      drawFile(fileX, fileY, time);
    }

    drawEpsteinSide(epsteinX, charY, time);
    drawTrumpSide(trumpX, charY, time, jumpOffset);

    chaseAnimId = requestAnimationFrame(animate);
  }
  chaseAnimId = requestAnimationFrame(animate);

  const origStartBtn = document.getElementById('start-btn');
  origStartBtn.addEventListener('click', () => {
    if (chaseAnimId) cancelAnimationFrame(chaseAnimId);
  }, { once: true });

  // Intro music — set up but don't play yet (loading screen handles playback)
  const introAudio = new Audio('assets/audio/intro.mp3');
  introAudio.loop = true;
  introAudio.volume = 0.5;
  window._introAudio = introAudio;
  window._introStopped = false;
})();

// ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', function startBtnClick() {
  const btn = this;
  btn.removeEventListener('click', startBtnClick);
  btn.style.pointerEvents = 'none';

  // Button press sound — clean subtle click
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const t = actx.currentTime;
    // Short noise burst filtered to a soft tick
    const bufLen = Math.floor(actx.sampleRate * 0.04);
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufLen * 0.08));
    }
    const src = actx.createBufferSource();
    src.buffer = buf;
    const bpf = actx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = 3200;
    bpf.Q.value = 2.5;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(bpf);
    bpf.connect(gain);
    gain.connect(actx.destination);
    src.start(t);
    src.stop(t + 0.04);
  } catch(e) {}

  // Compress animation
  btn.classList.add('btn-pressed');
  setTimeout(() => {
    btn.classList.remove('btn-pressed');
    btn.classList.add('btn-release');
    setTimeout(() => {
      btn.classList.remove('btn-release');
      // Stop intro music immediately and prevent re-triggering
      window._introStopped = true;
      if (window._introAudio) {
        window._introAudio.pause();
        window._introAudio.currentTime = 0;
        window._introAudio.volume = 0.5;
      }
      // Request fullscreen on mobile
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (isMobile) {
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
        if (rfs) rfs.call(el).catch(() => {});
        // Lock to portrait if supported
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('portrait').catch(() => {});
        }
      }
      initAudio();
      playBgMusic();
      renderer.domElement.style.display = 'block';
      state.running = true;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.getElementById('start-screen').classList.add('hidden');
      }));
    }, 250);
  }, 120);
});

// ENDSCREEN — position overlay + interactive elements to match image bounds
// ─────────────────────────────────────────────
window.updateEndscreenOverlay = updateEndscreenOverlay;
function updateEndscreenOverlay() {
  const refImg = document.getElementById('endlayer-5');
  const container = document.getElementById('game-over-screen');
  const overlay = document.getElementById('endscreen-overlay');
  if (!refImg || !container || !overlay) return;

  const cw = container.clientWidth, ch = container.clientHeight;
  const iw = refImg.naturalWidth || 5504, ih = refImg.naturalHeight || 3072;
  const scale = Math.min(cw / iw, ch / ih);
  const rw = iw * scale, rh = ih * scale;
  const ox = (cw - rw) / 2, oy = (ch - rh) / 2;

  // Size overlay to match rendered image bounds
  overlay.style.left = ox + 'px';
  overlay.style.top = oy + 'px';
  overlay.style.width = rw + 'px';
  overlay.style.height = rh + 'px';

  // Run Again hitbox — positioned as % of overlay (bottom center area)
  const hitbox = document.getElementById('endlayer-2-hitbox');
  if (hitbox) {
    hitbox.style.left = '35%';
    hitbox.style.top = '85%';
    hitbox.style.width = '30%';
    hitbox.style.height = '12%';
  }

  // Website link — positioned as % of overlay (middle area)
  const link = document.getElementById('endscreen-website-link');
  if (link) {
    link.style.left = '30%';
    link.style.top = '31%';
    link.style.width = '40%';
    link.style.height = '12%';
  }

  // Stats panel — centered on white frame area of busted image
  const stats = document.getElementById('endscreen-stats');
  if (stats) {
    // Use the smaller dimension to keep panel proportional and prevent blowup
    const ref = Math.min(rw, rh);
    const fontSize = Math.min(ref * 0.022, 14);
    const valueSize = Math.min(ref * 0.035, 24);
    const shareSize = Math.min(ref * 0.018, 12);
    const padding = Math.min(ref * 0.01, 6);
    const sharePad = Math.min(ref * 0.008, 5);
    const borderW = Math.max(1, Math.min(ref * 0.003, 3));
    const borderR = Math.max(2, Math.min(ref * 0.006, 6));
    stats.style.fontSize = fontSize + 'px';
    stats.style.left = ox + rw * 0.50 + 'px';
    stats.style.top = oy + rh * 0.65 + 'px';
    stats.style.transform = 'translate(-50%, -50%)';
    stats.style.maxWidth = (rw * 0.42) + 'px';
    stats.style.borderWidth = borderW + 'px';
    stats.style.borderRadius = borderR + 'px';
    stats.querySelectorAll('.stat-value').forEach(v => v.style.fontSize = valueSize + 'px');
    stats.querySelectorAll('.stat-row').forEach(r => {
      r.style.padding = padding + 'px ' + (padding * 1.5) + 'px';
      r.style.borderRightWidth = borderW + 'px';
    });
    // Scale the share button with the panel — override CSS clamp
    const shareBtn = stats.querySelector('.share-btn');
    if (shareBtn) {
      shareBtn.style.fontSize = shareSize + 'px';
      shareBtn.style.padding = sharePad + 'px ' + (sharePad * 2.5) + 'px';
    }
    stats.style.setProperty('--stats-border-w', borderW + 'px');
    stats.style.setProperty('--stats-border-r', borderR + 'px');
  }

}

// ─────────────────────────────────────────────
// Resize — handles orientation change and mobile viewport changes
function handleResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateEndscreenOverlay();
}
window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', () => setTimeout(handleResize, 150));
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', handleResize);
}

// Boot — wait for assets, then init
initWorld();
assetPreloader.markSceneReady();
update();

// Wait for user to click "TAP TO ENTER" then start intro music
assetPreloader.waitForUserEntry().then(() => {
  // User gesture just happened — audio is unlocked
  if (musicEnabled && window._introAudio && !window._introStopped) {
    window._introAudio.play().catch(() => {});
  }
});
</script>
</body>
